<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Client</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">⚕️ Fast Medical Distribution</span>
    </div>

    <div class="topbar-right">
      <button id="btnToggleTheme" class="icon-btn">🌙</button>
      <div id="userBar"></div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2 id="clientName">Client: -</h2>
      <p id="clientMeta" class="hint">-</p>

      <div class="dashboard" style="margin-top:14px;">
        <button class="dash-btn primary" id="btnNewOrder">
          <span class="icon">🧾</span>
          <div>
            <strong>Comandă nouă</strong>
            <small>Începe o comandă pentru client</small>
          </div>
        </button>

        <button class="dash-btn" id="btnPrices">
          <span class="icon">💲</span>
          <div>
            <strong>Prețuri speciale</strong>
            <small>Vezi / adaugă / șterge prețuri client</small>
          </div>
        </button>

        <button class="dash-btn" id="btnClientSold">
          <span class="icon">📉</span>
          <div>
            <strong>Sold client</strong>
            <small>(placeholder momentan)</small>
          </div>
        </button>

        <button class="dash-btn" id="btnClientInvoices">
          <span class="icon">🧾</span>
          <div>
            <strong>Facturi client</strong>
            <small>(placeholder momentan)</small>
          </div>
        </button>

        <button class="dash-btn" id="btnClientOrders">
          <span class="icon">📦</span>
          <div>
            <strong>Comenzi client</strong>
            <small>Filtrează orders doar pe clientul acesta</small>
          </div>
        </button>

        <a class="dash-btn" href="index.html" style="text-decoration:none;">
          <span class="icon">🏠</span>
          <div>
            <strong>Dashboard</strong>
            <small>Înapoi</small>
          </div>
        </a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Creează cont - OpenBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="global.css">
  <style>
    .authInput {
      color: #f8fafc !important;
      background: #1e293b !important;
      border: 2px solid #334155 !important;
      padding: 0.75rem 1rem !important;
      border-radius: 0.5rem !important;
      font-size: 1rem !important;
      width: 100% !important;
      margin-top: 0.5rem !important;
    }
    
    .authInput:focus {
      outline: none !important;
      border-color: #0284c7 !important;
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2) !important;
    }
    
    .authInput::placeholder {
      color: #64748b !important;
    }
    
    .authLabel {
      color: #f8fafc !important;
      font-weight: 500 !important;
      display: block !important;
      margin-bottom: 1rem !important;
      font-size: 0.9rem !important;
    }
    
    .authMsg {
      color: #ef4444 !important;
      margin-top: 1rem !important;
      font-size: 0.9rem !important;
      min-height: 1.5rem !important;
    }
    
    .authMsg.success {
      color: #22c55e !important;
    }
    
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    @media (max-width: 480px) {
      .two-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="authBody">
  <div class="authCard">
    <div class="authHeader">
      <div class="authLogo">👤</div>
      <h1>Creează cont</h1>
      <p class="muted">Înregistrează-te și primești 14 zile trial gratuit!</p>
    </div>

    <form id="registerForm" class="authForm" autocomplete="on">
      <div class="two-columns">
        <label class="authLabel">
          Nume *
          <input id="regLastName" class="authInput" type="text" required placeholder="Popescu" />
        </label>
        <label class="authLabel">
          Prenume *
          <input id="regFirstName" class="authInput" type="text" required placeholder="Ion" />
        </label>
      </div>

      <label class="authLabel">
        Email *
        <input id="regEmail" class="authInput" type="email" autocomplete="email" required placeholder="exemplu@email.com" />
      </label>

      <label class="authLabel">
        Telefon
        <input id="regPhone" class="authInput" type="tel" placeholder="0712345678" />
      </label>

      <label class="authLabel">
        Numele Companiei *
        <input id="regCompany" class="authInput" type="text" required placeholder="Numele firmei tale" />
      </label>

      <label class="authLabel">
        Parolă *
        <input id="regPass" class="authInput" type="password" autocomplete="new-password" required placeholder="Minim 6 caractere" />
      </label>

      <label class="authLabel">
        Confirmă Parola *
        <input id="regConfirmPass" class="authInput" type="password" autocomplete="new-password" required placeholder="Repetă parola" />
      </label>

      <button id="btnRegister" class="authBtn" type="submit">Creează cont</button>
      <div id="registerMsg" class="authMsg"></div>
    </form>

    <div class="authFooter">
      <a class="authLinkBtn" href="login.html">Am deja cont</a>
    </div>
    
    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #334155; font-size: 0.75rem; color: #94a3b8;">
      <a href="termeni-si-conditii.html" style="color: #94a3b8; text-decoration: none; margin-right: 1rem;">Termeni și Condiții</a>
      <a href="politica-confidentialitate.html" style="color: #94a3b8; text-decoration: none;">Politica de Confidențialitate</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnRegister');
      const msg = document.getElementById('registerMsg');
      
      const data = {
        email: document.getElementById('regEmail').value.trim(),
        password: document.getElementById('regPass').value,
        confirmPassword: document.getElementById('regConfirmPass').value,
        firstName: document.getElementById('regFirstName').value.trim(),
        lastName: document.getElementById('regLastName').value.trim(),
        companyName: document.getElementById('regCompany').value.trim(),
        phone: document.getElementById('regPhone').value.trim(),
        position: 'Administrator'
      };
      
      // Validare client-side
      if (data.password !== data.confirmPassword) {
        msg.textContent = "Parolele nu coincid!";
        msg.className = "authMsg";
        return;
      }
      
      if (data.password.length < 8) {
        msg.textContent = "Parola trebuie să aibă cel puțin 8 caractere!";
        msg.className = "authMsg";
        return;
      }
      
      btn.disabled = true;
      btn.textContent = "Se procesează...";
      msg.textContent = "";
      
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (result.ok) {
          msg.textContent = result.message || "Cont creat cu succes! Verifică email-ul.";
          msg.className = "authMsg success";
          
          // Salvează email pentru pagina de verificare
          localStorage.setItem('pendingVerificationEmail', result.email);
          localStorage.setItem('pendingVerificationSubdomain', result.subdomain);
          
          // Redirect la pagina de verificare după 2 secunde
          setTimeout(() => {
            window.location.href = '/verify-email.html';
          }, 2000);
        } else {
          msg.textContent = result.error || "Eroare la înregistrare";
          msg.className = "authMsg";
        }
      } catch (err) {
        msg.textContent = "Eroare de conexiune. Încearcă din nou.";
        msg.className = "authMsg";
      } finally {
        btn.disabled = false;
        btn.textContent = "Creează cont";
      }
    });
  </script>
</body>
</html>

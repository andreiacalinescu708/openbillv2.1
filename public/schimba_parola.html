<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schimbă Parola - Fast Medical</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #667eea;
      text-decoration: none;
      font-size: 1.2rem;
      transition: transform 0.3s;
    }

    .back-btn:hover {
      transform: translateX(-5px);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      margin-top: 20px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 15px 45px 15px 15px;
      border: 2px solid #e1e1e1;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
      transition: color 0.3s;
    }

    .toggle-password:hover {
      color: #667eea;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.95rem;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .password-requirements {
      font-size: 0.85rem;
      color: #666;
      margin-top: 5px;
      padding-left: 5px;
    }

    .requirement {
      margin: 3px 0;
    }

    .requirement.met {
      color: #28a745;
    }

    .requirement.met::before {
      content: "✓ ";
      font-weight: bold;
    }

    .requirement:not(.met)::before {
      content: "○ ";
      color: #999;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>

    <h2><i class="fas fa-key"></i> Schimbă Parola</h2>
    <p class="subtitle">Pentru securitatea contului tău</p>

    <div id="message" class="message"></div>

    <form id="schimbaParolaForm">
      <div class="form-group">
        <label for="parolaVeche">Parola Actuală</label>
        <div class="input-wrapper">
          <input type="password" id="parolaVeche" name="parolaVeche" required>
          <i class="fas fa-eye toggle-password" onclick="togglePassword('parolaVeche')"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="parolaNoua">Parola Nouă</label>
        <div class="input-wrapper">
          <input type="password" id="parolaNoua" name="parolaNoua" required minlength="6">
          <i class="fas fa-eye toggle-password" onclick="togglePassword('parolaNoua')"></i>
        </div>
        <div class="password-requirements">
          <div class="requirement" id="req-length">Minim 6 caractere</div>
          <div class="requirement" id="req-upper">Cel puțin o literă mare</div>
          <div class="requirement" id="req-number">Cel puțin un număr</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmaParola">Confirmă Parola Nouă</label>
        <div class="input-wrapper">
          <input type="password" id="confirmaParola" name="confirmaParola" required>
          <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmaParola')"></i>
        </div>
      </div>

      <button type="submit">
        <i class="fas fa-save"></i> Salvează Parola Nouă
      </button>
    </form>
  </div>

  <script src="script.js"></script>
  <script>
    // Verificare parole în timp real
    document.getElementById('parolaNoua').addEventListener('input', function(e) {
      const val = e.target.value;
      document.getElementById('req-length').classList.toggle('met', val.length >= 6);
      document.getElementById('req-upper').classList.toggle('met', /[A-Z]/.test(val));
      document.getElementById('req-number').classList.toggle('met', /[0-9]/.test(val));
    });

    document.getElementById('schimbaParolaForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const parolaVeche = document.getElementById('parolaVeche').value;
      const parolaNoua = document.getElementById('parolaNoua').value;
      const confirmaParola = document.getElementById('confirmaParola').value;
      const username = localStorage.getItem('username');

      if (!username) {
        showMessage('Trebuie să fii autentificat!', 'error');
        return;
      }

      if (parolaNoua !== confirmaParola) {
        showMessage('Parola nouă și confirmarea nu coincid!', 'error');
        return;
      }

      if (parolaNoua.length < 6) {
        showMessage('Parola nouă trebuie să aibă minim 6 caractere!', 'error');
        return;
      }

      try {
        const response = await fetch('/api/schimba-parola', {
          method: 'POST',
          credentials: 'same-origin',  // ✅ TRIMITE COOKIE-URILE DE SESIUNE
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: username,
            parolaVeche: parolaVeche,
            parolaNoua: parolaNoua
          })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Parola a fost schimbată cu succes! Vei fi redirecționat...', 'success');
          document.getElementById('schimbaParolaForm').reset();
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          showMessage(data.error || 'Eroare la schimbarea parolei', 'error');
        }
      } catch (error) {
        showMessage('Eroare de conexiune!', 'error');
      }
    });

    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = `message ${type} show`;
      setTimeout(() => msgDiv.classList.remove('show'), 5000);
    }

    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>

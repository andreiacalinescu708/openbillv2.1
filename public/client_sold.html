<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sold client</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="global.css">
  <style>
    .sold-box { background: var(--surface); border-radius: 8px; padding: 20px; margin: 20px 0; border: 1px solid var(--border); }
    .sold-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .sold-value { font-size: 1.4rem; font-weight: bold; color: #ef4444; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: rgba(0,0,0,0.2); }
    .expired { color: #f59e0b; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left"><span class="brand">⚕️ Fast Medical Distribution</span></div>
    <div class="topbar-right"><div id="userBar"></div></div>
  </header>

  <main class="container">
    <div class="panel">
      <h2>Sold client - Facturi Scadente</h2>
      
      <div id="loading">⏳ Se încarcă...</div>
      
      <div id="content" style="display: none;">
        <div class="sold-box">
          <div class="sold-row" style="border-bottom: none;">
            <span>Total de plată:</span>
            <span id="totalAmount" class="sold-value">0.00 RON</span>
          </div>
        </div>
        
        <details open>
          <summary>Detalii facturi</summary>
          <div id="detaliiFacturi"></div>
        </details>
        
        <p class="hint" style="text-align: center; margin-top: 16px;">
          <small>Actualizat: <span id="dataUpdate">-</span></small>
        </p>
      </div>
      
      <div id="expiredMsg" class="expired" style="display: none;"></div>

      <a class="linkbtn" href="client.html" style="margin-top: 20px;">⬅️ Înapoi la client</a>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    window.addEventListener('load', async function() {
      const client = JSON.parse(localStorage.getItem('clientSelectat') || '{}');
      if (!client.id) {
        alert('Nu este selectat niciun client!');
        return;
      }
      
      try {
        const res = await fetch(`/api/clients/${client.id}/balances`);
        const data = await res.json();
        
        document.getElementById('loading').style.display = 'none';
        
        if (data.expired) {
          document.getElementById('expiredMsg').style.display = 'block';
          document.getElementById('expiredMsg').innerHTML = `
            <div style="font-size: 3rem;">⏰</div>
            <p>${data.message}</p>
            <p class="hint">Încarcă raportul nou din secțiunea Birou.</p>
          `;
          return;
        }
        
        document.getElementById('content').style.display = 'block';
        document.getElementById('totalAmount').textContent = data.totalBalance.toFixed(2) + ' RON';
        document.getElementById('dataUpdate').textContent = new Date(data.lastUpload).toLocaleString('ro-RO');
        
        let html = '';
        if (data.invoices.length === 0) {
          html = '<p class="hint">Nu sunt facturi scadente pentru acest client. ✅</p>';
        } else {
          html = `<p class="hint">Total facturi: ${data.invoices.length}</p>`;
          html += '<table><thead><tr><th>Factura</th><th>Data Scadență</th><th>Zile întârziere</th><th style="text-align:right;">Sumă</th></tr></thead><tbody>';
          
          data.invoices.forEach(inv => {
            html += `<tr>
              <td>${inv.invoice_number}</td>
              <td>${new Date(inv.due_date).toLocaleDateString('ro-RO')}</td>
              <td style="color: #ef4444; font-weight: 600;">${inv.days_overdue} zile</td>
              <td style="text-align:right; font-weight: 600;">${parseFloat(inv.balance_due).toFixed(2)} RON</td>
            </tr>`;
          });
          
          html += '</tbody></table>';
        }
        document.getElementById('detaliiFacturi').innerHTML = html;
        
      } catch (e) {
        console.error(e);
        document.getElementById('loading').textContent = '❌ Eroare la încărcare';
      }
    });
  </script>
</body>
</html>

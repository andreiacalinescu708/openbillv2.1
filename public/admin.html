<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panou Administrare - Aprobări</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .topbar { background: #0284c7; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #1e293b; border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; border: 1px solid #334155; }
    
    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #334155; }
    .tab { padding: 1rem 2rem; cursor: pointer; border-bottom: 2px solid transparent; opacity: 0.7; }
    .tab.active { border-bottom-color: #0284c7; opacity: 1; font-weight: 600; }
    
    .user-card { 
      background: #0f172a; 
      border: 1px solid #334155; 
      border-radius: 0.75rem; 
      padding: 1.5rem; 
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-info { flex: 1; }
    .user-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    .user-meta { color: #94a3b8; font-size: 0.9rem; }
    
    .btn-approve { 
      background: #10b981; 
      color: white; 
      border: none; 
      padding: 0.75rem 1.5rem; 
      border-radius: 0.5rem; 
      cursor: pointer; 
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .btn-approve:hover { background: #059669; }
    
    .btn-reject { 
      background: #ef4444; 
      color: white; 
      border: none; 
      padding: 0.75rem 1.5rem; 
      border-radius: 0.5rem; 
      cursor: pointer; 
      font-weight: 600;
    }
    .btn-reject:hover { background: #dc2626; }
    
    .empty-state { 
      text-align: center; 
      padding: 3rem; 
      color: #64748b; 
      font-style: italic; 
    }
    
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
    }
    
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #94a3b8; font-weight: 600; }
    
    .badge { 
      padding: 0.25rem 0.75rem; 
      border-radius: 9999px; 
      font-size: 0.875rem; 
      font-weight: 600; 
      display: inline-block;
    }
    .badge-admin { background: #f59e0b; color: #1e293b; }
    .badge-user { background: #3b82f6; color: white; }
    .badge-pending { background: #ef4444; color: white; }
    .badge-approved { background: #10b981; color: white; }
    
    @media (max-width: 768px) {
      .user-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .tabs { flex-wrap: wrap; }
      .tab { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h2>🔧 Panou Administrare Utilizatori</h2>
    <div>
      <a href="index.html" style="color: white; text-decoration: none; font-weight: 500;">← Înapoi la aplicație</a>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <div class="tab active" data-tab="pending">⏳ În Așteptare</div>
      <div class="tab" data-tab="all">👥 Toți Utilizatorii</div>
    </div>

    <!-- Secțiunea În Așteptare -->
    <div id="pending-section" class="card">
      <h3>Utilizatori în așteptare de aprobare</h3>
      <div id="errorPending" class="error-box"></div>
      <div id="pendingList">
        <p class="empty-state">Se încarcă...</p>
      </div>
    </div>

    <!-- Secțiunea Toți Utilizatorii -->
    <div id="all-section" class="card" style="display: none;">
      <h3>Toți utilizatorii din sistem</h3>
      <div id="errorAll" class="error-box"></div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Rol</th>
            <th>Status</th>
            <th>Data înregistrării</th>
          </tr>
        </thead>
        <tbody id="allUsersList"></tbody>
      </table>
    </div>
  </div>

  <script>
    // Stocăm datele global ca să le accesăm la click
    let pendingUsers = [];
    let allUsers = [];

    async function init() {
      try {
        const res = await fetch('/api/me');
        const data = await res.json();
        
        if (!data.loggedIn || data.user.role !== 'admin') {
          alert('Acces interzis! Doar administratorii pot vedea această pagină.');
          window.location.href = 'index.html';
          return;
        }
        
        // Setup tab-uri
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', (e) => {
            const tabName = e.target.dataset.tab;
            showTab(tabName);
          });
        });
        
        await loadPending();
        await loadAllUsers();
      } catch (err) {
        console.error(err);
        alert('Eroare la inițializare: ' + err.message);
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      
      if (tab === 'pending') {
        document.getElementById('pending-section').style.display = 'block';
        document.getElementById('all-section').style.display = 'none';
      } else {
        document.getElementById('pending-section').style.display = 'none';
        document.getElementById('all-section').style.display = 'block';
      }
    }

    function showError(section, message) {
      const el = document.getElementById(section === 'pending' ? 'errorPending' : 'errorAll');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function loadPending() {
      const container = document.getElementById('pendingList');
      try {
        const res = await fetch('/api/users/pending');
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Eroare server');
        }
        
        pendingUsers = data;
        
        if (pendingUsers.length === 0) {
          container.innerHTML = '<p class="empty-state">Nu sunt utilizatori în așteptare. Toate conturile sunt aprobate! 🎉</p>';
          return;
        }
        
        container.innerHTML = '';
        pendingUsers.forEach((user, index) => {
          const div = document.createElement('div');
          div.className = 'user-card';
          div.innerHTML = `
            <div class="user-info">
              <div class="user-name">${escapeHtml(user.username)}</div>
              <div class="user-meta">
                ID: ${user.id} • Înregistrat: ${new Date(user.created_at).toLocaleDateString('ro-RO')}
              </div>
            </div>
            <div>
              <button class="btn-approve" data-id="${user.id}" data-username="${escapeHtml(user.username)}" data-action="approve">✓ Aprobă</button>
              <button class="btn-reject" data-id="${user.id}" data-username="${escapeHtml(user.username)}" data-action="reject">✗ Respinge</button>
            </div>
          `;
          container.appendChild(div);
        });
        
        // Adăugăm event listeners pe butoane
        container.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', handleAction);
        });
        
      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="empty-state" style="color:#ef4444">Eroare: ${err.message}</p>`;
      }
    }

    async function loadAllUsers() {
      const tbody = document.getElementById('allUsersList');
      try {
        const res = await fetch('/api/users');
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Eroare server');
        }
        
        allUsers = data;
        
        if (allUsers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#64748b;">Nu există utilizatori</td></tr>';
          return;
        }
        
        tbody.innerHTML = allUsers.map(user => `
          <tr>
            <td>${user.id}</td>
            <td><strong>${escapeHtml(user.username)}</strong></td>
            <td><span class="badge badge-${user.role}">${user.role}</span></td>
            <td><span class="badge badge-${user.is_approved ? 'approved' : 'pending'}">${user.is_approved ? '✓ Aprobat' : '⏳ În așteptare'}</span></td>
            <td>${new Date(user.created_at).toLocaleDateString('ro-RO')}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="5" style="color:#ef4444">Eroare: ${err.message}</td></tr>`;
      }
    }

    async function handleAction(e) {
      const btn = e.target;
      const userId = btn.dataset.id;
      const username = btn.dataset.username;
      const action = btn.dataset.action;
      
      if (!userId) {
        alert('Eroare: ID lipsă');
        return;
      }
      
      const confirmMsg = action === 'approve' 
        ? `Aprobi utilizatorul "${username}"?` 
        : `Ștergi definitiv utilizatorul "${username}"?`;
        
      if (!confirm(confirmMsg)) return;
      
      btn.disabled = true;
      btn.textContent = '⏳...';
      
      try {
        const url = action === 'approve' 
          ? `/api/users/approve/${userId}` 
          : `/api/users/reject/${userId}`;
          
        const res = await fetch(url, { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || `Eroare ${res.status}`);
        }
        
        alert(action === 'approve' ? '✅ Utilizator aprobat!' : '🗑️ Utilizator șters!');
        await loadPending();
        await loadAllUsers();
        
      } catch (err) {
        console.error(err);
        showError('pending', 'Eroare: ' + err.message);
        btn.disabled = false;
        btn.textContent = action === 'approve' ? '✓ Aprobă' : '✗ Respinge';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Pornim
    init();
  </script>
</body>
</html>

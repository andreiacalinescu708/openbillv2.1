<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.4s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto var(--space-5);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
    }

    .auth-header p {
      color: var(--text-muted);
      margin: 0;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-color);
    }

    .auth-footer a {
      color: var(--primary-400);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Mesaje de eroare/succes */
    #loginMsg {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
      animation: shake 0.4s ease-in-out;
    }

    #loginMsg.show {
      display: block;
    }

    /* Tipuri de mesaje */
    .msg-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-500);
    }

    .msg-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #f59e0b;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">⚕️</div>
        <h1>Fast Medical Distribution</h1>
        <p>Autentificare în sistem</p>
      </div>

      <!-- FORMULAR UNIC -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginUser">Username</label>
          <input type="text" id="loginUser" class="form-input" placeholder="Introdu username" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPass">Parolă</label>
          <input type="password" id="loginPass" class="form-input" placeholder="Introdu parola" required autocomplete="current-password" />
        </div>

        <!-- AICI APAR ERORILE -->
        <div id="loginMsg"></div>

        <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">
          Autentificare
        </button>
      </form>

      <div class="auth-footer">
        <span style="color: var(--text-muted);">Nu ai cont?</span>
        <a href="register.html">Creează cont nou</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

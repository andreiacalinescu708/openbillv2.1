<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - OpenBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="global.css" />
  
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.4s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto var(--space-5);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
    }

    .auth-header p {
      color: var(--text-muted);
      margin: 0;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-color);
    }

    .auth-footer a {
      color: var(--primary-400);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Mesaje de eroare/succes */
    #loginMsg {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
      animation: shake 0.4s ease-in-out;
    }

    #loginMsg.show {
      display: block;
    }

    /* Tipuri de mesaje */
    .msg-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-500);
    }

    .msg-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #f59e0b;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" /><stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" /></linearGradient></defs><rect width="100" height="100" rx="20" fill="url(#bgLogo)"/><text x="32" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="45" font-weight="600" fill="#ffffff">o</text><text x="52" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#38bdf8">B</text><rect width="100" height="100" rx="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/></svg></div>
        <h1>OpenBill</h1>
        <p>Autentificare în sistem</p>
      </div>

      <!-- FORMULAR UNIC -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginUser">Username / Email</label>
          <input type="text" id="loginUser" class="form-input" placeholder="Username sau Email" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPass">Parolă</label>
          <input type="password" id="loginPass" class="form-input" placeholder="Introdu parola" required autocomplete="current-password" />
          <div style="text-align: right; margin-top: 0.25rem;">
            <a href="forgot-password.html" style="font-size: 0.75rem; color: var(--primary);">Am uitat parola</a>
          </div>
        </div>

        <!-- AICI APAR ERORILE -->
        <div id="loginMsg"></div>

        <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">
          Autentificare
        </button>
      </form>

      <div class="auth-footer">
        <span style="color: var(--text-muted);">Nu ai cont?</span>
        <a href="landing.html">Creeaza cont nou</a>
      </div>
      
      <div style="text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: var(--text-muted);">
        <a href="termeni-si-conditii.html" style="color: var(--text-muted); text-decoration: none; margin-right: 1rem;">Termeni și Condiții</a>
        <a href="politica-confidentialitate.html" style="color: var(--text-muted); text-decoration: none;">Politica de Confidențialitate</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

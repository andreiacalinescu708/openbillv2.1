<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="authBody">
  <div class="authCard">
    <div class="authHeader">
      <div class="authLogo">📦</div>
      <h1>Autentificare</h1>
      <p class="muted">Intră în cont ca să continui.</p>
    </div>

    <form id="loginForm" class="authForm" autocomplete="on">
      <label class="authLabel">
        Username
        <input id="loginUser" class="authInput" type="text" autocomplete="username" required />
      </label>

      <label class="authLabel">
        Parolă
        <input id="loginPass" class="authInput" type="password" autocomplete="current-password" required />
      </label>

      <button id="btnLogin" class="authBtn" type="submit">Login</button>
      <div id="loginMsg" class="authMsg"></div>
    </form>

    <div class="authFooter">
      <span class="muted">Nu ai cont?</span>
      <a class="authLinkBtn" href="register.html">Creează cont</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

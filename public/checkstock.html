<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventar Stoc</title>
  <link rel="stylesheet" href="checkstockhtml.css" />
</head>
<body>

<!-- TOP BAR -->
<header class="inv-topbar">
  <div class="inv-top-left">
    <span class="inv-logo">📦</span>
    <span class="inv-brand">Fast Medical Distribution</span>
  </div>

  <button class="inv-back" onclick="location.href='index.html'">
    ⬅ Înapoi
  </button>
</header>

<main class="inv-screen">

  <h1 class="inv-title">Inventar Stoc</h1>

  <!-- SEARCH + REFRESH -->
  <div class="inv-search-row">
    <div class="inv-search">
      🔍
      <input
        id="inventorySearch"
        placeholder="Caută produs..."
        autocomplete="off"
      />
    </div>

    <button id="btnRefreshStock" class="inv-refresh">
      🔄 Refresh
    </button>
  </div>

  <!-- LISTA -->
  <div id="inventoryList" class="inv-list"></div>

  <!-- TOTAL GENERAL -->
  <div id="inventoryTotal" class="inv-total">
    Total: 0 buc
  </div>

</main>

<script src="script.js"></script>
</body>
</html>

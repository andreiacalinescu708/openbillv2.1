<!DOCTYPE html>
<html lang="ro">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
 <title>Inventar Stoc - OpenBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
 <link rel="stylesheet" href="global.css" />
 <link rel="stylesheet" href="checkstockhtml.css" />
 <style>
 .warehouse-tabs {
 display: flex;
 gap: var(--space-2);
 margin-bottom: var(--space-4);
 padding: var(--space-2);
 background: rgba(15, 23, 42, 0.6);
 border-radius: var(--radius-xl);
 border: 1px solid var(--border-color);
 overflow-x: auto;
 }

 .tab-btn {
 flex: 1;
 min-width: 120px;
 padding: var(--space-3) var(--space-4);
 border: 1px solid var(--border-color);
 background: rgba(255, 255, 255, 0.05);
 color: var(--text-secondary);
 border-radius: var(--radius-lg);
 cursor: pointer;
 font-weight: 600;
 font-size: 0.9375rem;
 transition: all 0.2s;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: var(--space-2);
 }

 .tab-btn.active {
 background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
 color: white;
 border-color: var(--primary-500);
 box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
 }

 .tab-btn .badge {
 background: rgba(255,255,255,0.2);
 padding: 2px 8px;
 border-radius: 999px;
 font-size: 0.75rem;
 font-weight: 700;
 }

 .total-pill {
 background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
 color: white;
 padding: var(--space-4) var(--space-5);
 border-radius: var(--radius-xl);
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: var(--space-5);
 }

 .alert-box {
 background: rgba(245, 158, 11, 0.1);
 border: 1px solid rgba(245, 158, 11, 0.3);
 color: var(--warning-400);
 padding: var(--space-3);
 border-radius: var(--radius-lg);
 margin-bottom: var(--space-3);
 }
 
 /* Alert Accordion */
 .alert-accordion {
 background: rgba(245, 158, 11, 0.1);
 border: 1px solid rgba(245, 158, 11, 0.3);
 border-radius: var(--radius-lg);
 margin-bottom: var(--space-3);
 overflow: hidden;
 }
 
 .alert-header {
 padding: var(--space-3) var(--space-4);
 cursor: pointer;
 display: flex;
 justify-content: space-between;
 align-items: center;
 color: var(--warning-400);
 font-weight: 600;
 transition: background 0.2s;
 }
 
 .alert-header:hover {
 background: rgba(245, 158, 11, 0.15);
 }
 
 .alert-arrow {
 font-size: 0.75rem;
 transition: transform 0.2s;
 }
 
 .alert-content {
 padding: var(--space-3) var(--space-4);
 background: var(--bg-card);
 border-top: 1px solid rgba(245, 158, 11, 0.2);
 color: var(--text-primary);
 font-size: 0.875rem;
 max-height: 300px;
 overflow-y: auto;
 }

 /* Accordion Cards */
 .stock-card {
 background: var(--bg-card);
 border: 1px solid var(--border-color);
 border-radius: var(--radius-xl);
 margin-bottom: var(--space-3);
 overflow: hidden;
 transition: all 0.2s;
 }

 .stock-card:hover {
 border-color: var(--primary-500);
 }

 .stock-header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: var(--space-4) var(--space-5);
 cursor: pointer;
 user-select: none;
 background: rgba(15, 23, 42, 0.4);
 transition: background 0.2s;
 }

 .stock-header:hover {
 background: rgba(59, 130, 246, 0.1);
 }

 .stock-header.expanded {
 background: rgba(59, 130, 246, 0.15);
 border-bottom: 1px solid var(--border-color);
 }

 .stock-title {
 display: flex;
 align-items: center;
 gap: var(--space-3);
 font-weight: 700;
 font-size: 1.0625rem;
 }

 .stock-icon {
 font-size: 1.5rem;
 }

 .stock-total {
 background: rgba(34, 197, 94, 0.15);
 color: var(--success-400);
 padding: var(--space-1) var(--space-3);
 border-radius: var(--radius-full);
 font-weight: 700;
 font-size: 0.9375rem;
 border: 1px solid rgba(34, 197, 94, 0.3);
 }

 .stock-total.low {
 background: rgba(239, 68, 68, 0.15);
 color: var(--danger-400);
 border-color: rgba(239, 68, 68, 0.3);
 }

 .stock-body {
 display: none;
 padding: var(--space-4);
 }

 .stock-body.show {
 display: block;
 }

 .lot-row {
 background: rgba(255, 255, 255, 0.03);
 border: 1px solid var(--border-color);
 border-radius: var(--radius-lg);
 padding: var(--space-4);
 margin-bottom: var(--space-3);
 display: grid;
 grid-template-columns: 1fr 1fr 1fr 1fr auto;
 gap: var(--space-4);
 align-items: center;
 }

 @media (max-width: 768px) {
 .lot-row {
 grid-template-columns: 1fr 1fr;
 gap: var(--space-3);
 }
 }

 .lot-field {
 display: flex;
 flex-direction: column;
 gap: 4px;
 }

 .lot-label {
 font-size: 0.75rem;
 color: var(--text-muted);
 text-transform: uppercase;
 font-weight: 700;
 letter-spacing: 0.5px;
 }

 .lot-value {
 font-weight: 700;
 color: var(--text-primary);
 font-size: 1rem;
 }

 .lot-actions {
 display: flex;
 gap: var(--space-2);
 justify-content: flex-end;
 }

 @media (max-width: 768px) {
 .lot-actions {
 grid-column: 1 / -1;
 justify-content: flex-start;
 margin-top: var(--space-2);
 }
 }

 .btn-icon {
 width: 36px;
 height: 36px;
 border-radius: var(--radius-md);
 border: 1px solid var(--border-color);
 background: rgba(255,255,255,0.05);
 color: var(--text-primary);
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 1.125rem;
 transition: all 0.2s;
 }

 .btn-icon:hover {
 background: rgba(59, 130, 246, 0.2);
 border-color: var(--primary-500);
 transform: translateY(-2px);
 }

 .btn-icon.delete:hover {
 background: rgba(239, 68, 68, 0.2);
 border-color: var(--danger-500);
 color: var(--danger-400);
 }

 /* Modal Edit */
 .modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0, 0, 0, 0.8);
 backdrop-filter: blur(4px);
 z-index: 1000;
 display: none;
 align-items: center;
 justify-content: center;
 padding: var(--space-4);
 }

 .modal-overlay.show {
 display: flex;
 }

 .modal-content {
 background: var(--bg-card);
 border: 1px solid var(--border-color);
 border-radius: var(--radius-xl);
 width: 100%;
 max-width: 500px;
 max-height: 90vh;
 overflow-y: auto;
 box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
 }

 .modal-header {
 padding: var(--space-4) var(--space-5);
 border-bottom: 1px solid var(--border-color);
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 .modal-header h3 {
 margin: 0;
 font-size: 1.25rem;
 }

 .modal-close {
 background: none;
 border: none;
 color: var(--text-muted);
 font-size: 1.5rem;
 cursor: pointer;
 padding: 0;
 width: 36px;
 height: 36px;
 display: flex;
 align-items: center;
 justify-content: center;
 border-radius: var(--radius-full);
 transition: all 0.2s;
 }

 .modal-close:hover {
 background: rgba(239, 68, 68, 0.1);
 color: var(--danger-400);
 }

 .modal-body {
 padding: var(--space-5);
 }

 .form-readonly {
 background: rgba(255,255,255,0.05);
 padding: var(--space-3) var(--space-4);
 border-radius: var(--radius-lg);
 border: 1px solid var(--border-color);
 margin-bottom: var(--space-4);
 }

 .form-readonly label {
 display: block;
 font-size: 0.75rem;
 color: var(--text-muted);
 text-transform: uppercase;
 margin-bottom: 4px;
 }

 .form-readonly value {
 font-weight: 700;
 color: var(--text-primary);
 font-size: 1.0625rem;
 }

 .modal-footer {
 padding: var(--space-4) var(--space-5);
 border-top: 1px solid var(--border-color);
 display: flex;
 gap: var(--space-3);
 justify-content: flex-end;
 }

 .transfer-btn {
 position: fixed;
 bottom: 20px;
 right: 20px;
 background: linear-gradient(135deg, var(--success-600), var(--success-700));
 color: white;
 padding: 16px 24px;
 border-radius: 50px;
 font-weight: 700;
 box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
 z-index: 100;
 text-decoration: none;
 display: flex;
 align-items: center;
 gap: 8px;
 }
 </style>
</head>
<body>
 <nav class="navbar">
 <div class="navbar-inner">
 <a href="index.html" class="navbar-brand">
 <div class="navbar-brand-icon"><svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><defs><linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" /><stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" /></linearGradient></defs><rect width="100" height="100" rx="20" fill="url(#bgLogo)"/><text x="32" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="45" font-weight="600" fill="#ffffff">o</text><text x="52" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#38bdf8">B</text><rect width="100" height="100" rx="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/></svg></div>
 <span>Pagina Principala</span>
 </a>
 <div class="navbar-actions">
 <div id="userBar"></div>
 <a href="index.html" class="btn btn-ghost btn-sm">&larr; Inapoi</a>
 </div>
 </div>
 </nav>

 <main class="container">
 <h1>Inventar Stoc</h1>
 
 <!-- Tab-uri -->
 <div class="warehouse-tabs">
 <button class="tab-btn active" onclick="switchTab('depozit')">
 &#127981; Depozit <span class="badge" id="badge-depozit">0</span>
 </button>
 <button class="tab-btn" onclick="switchTab('magazin')">
 &#127978; Magazin <span class="badge" id="badge-magazin">0</span>
 </button>
 <button class="tab-btn" onclick="switchTab('total')">
 &#128202; Total
 </button>
 </div>

 <div id="alertsContainer"></div>
 
 <div class="total-pill">
 <span>Total bucati in stoc</span>
 <span class="value" id="totalCount">0</span>
 </div>

 <div class="csTools">
 <div class="csSearch">
 <span>&#128269;</span>
 <input type="text" id="stockSearch" placeholder="Cauta produs..." oninput="filterStock()" />
 </div>
 <button class="csRefresh" onclick="loadStock()">&#128260;</button>
 </div>

 <div id="inventoryList">
 <p class="hint">Se incarca...</p>
 </div>
 </main>

 <!-- Buton Transfer -->
 <a href="transfer.html" class="transfer-btn">&#128260; Transfer</a>

 <!-- Modal Edit -->
 <div class="modal-overlay" id="editModal">
 <div class="modal-content">
 <div class="modal-header">
 <h3>&#9999; Editare Stoc</h3>
 <button class="modal-close" onclick="closeModal()">&times;</button>
 </div>
 <div class="modal-body">
 <input type="hidden" id="editId">
 
 <div class="form-readonly">
 <label>Produs</label>
 <value id="editProdName">-</value>
 </div>
 
 <div class="form-readonly">
 <label>LOT</label>
 <value id="editLot">-</value>
 </div>
 
 <div class="form-readonly" id="editWarehouseBox">
 <label>Gestiune</label>
 <value id="editWarehouse">-</value>
 </div>

 <div class="form-group">
 <label class="form-label">Cantitate</label>
 <input type="number" id="editQty" class="form-input" min="0">
 </div>

 <div class="form-group" id="editLocationBox">
 <label class="form-label">Locatie</label>
 <select id="editLocation" class="form-select">
 <option value="D1">&#127970; D1</option>
 <option value="D2">&#127970; D2</option>
 <option value="D3">&#127970; D3</option>
 <option value="R1">&#127970; R1</option>
 <option value="R2">&#127970; R2</option>
 <option value="R3">&#127970; R3</option>
 <option value="M1">&#127978; M1</option>
 <option value="M2">&#127978; M2</option>
 <option value="M3">&#127978; M3</option>
 </select>
 </div>
 </div>
 <div class="modal-footer">
 <button class="btn btn-ghost" onclick="closeModal()">Anuleaza</button>
 <button class="btn btn-primary" onclick="saveEdit()">&#128190; Salveaza</button>
 </div>
 </div>
 </div>

 <script>
 let allStock = [];
 let currentTab = 'depozit';

 function groupByProduct(stock) {
 const map = {};
 stock.forEach(s => {
 const key = s.productName + '|' + s.gtin;
 if (!map[key]) map[key] = { productName: s.productName, gtin: s.gtin, totalQty: 0, lots: [] };
 map[key].totalQty += Number(s.qty || 0);
 map[key].lots.push(s);
 });
 return Object.values(map);
 }

 function renderStock(stockToRender) {
 const list = document.getElementById('inventoryList');
 list.innerHTML = '';
 
 if (!stockToRender.length) {
 list.innerHTML = '<p class="hint">Nu exista stoc.</p>';
 return;
 }

 const groups = groupByProduct(stockToRender);
 
 groups.forEach((group, idx) => {
 const isLow = group.totalQty < 30;
 
 const card = document.createElement('div');
 card.className = 'stock-card';
 
 const header = document.createElement('div');
 header.className = 'stock-header';
 header.innerHTML = `
 <div class="stock-title">
 <span class="stock-icon">&#128230;</span>
 <span>${group.productName}</span>
 </div>
 <span class="stock-total ${isLow ? 'low' : ''}">${group.totalQty} buc</span>
 `;
 
 const body = document.createElement('div');
 body.className = 'stock-body';
 body.id = `body-${idx}`;
 
 // Genereaza raandurile LOT
 group.lots.forEach(lot => {
 const isMagazin = lot.warehouse === 'magazin';
 const lotRow = document.createElement('div');
 lotRow.className = 'lot-row';
 lotRow.innerHTML = `
 <div class="lot-field">
 <span class="lot-label">LOT</span>
 <span class="lot-value">${lot.lot}</span>
 </div>
 <div class="lot-field">
 <span class="lot-label">Expira</span>
 <span class="lot-value">${(lot.expiresAt || '-').slice(0,10)}</span>
 </div>
 <div class="lot-field">
 <span class="lot-label">Cantitate</span>
 <span class="lot-value">${lot.qty} buc</span>
 </div>
 <div class="lot-field">
 <span class="lot-label">Locatie</span>
 <span class="lot-value">${isMagazin ? '&#127978; Magazin' : `&#127970; ${lot.location || 'A'}`}</span>
 </div>
 <div class="lot-actions">
 <button class="btn-icon" onclick="openEdit('${lot.id}', event)" title="Edit">&#9999;</button>
 <button class="btn-icon delete" onclick="deleteLot('${lot.id}', '${group.productName.replace(/'/g, "\\'")}', event)" title="Sterge">&#128465;</button>
 </div>
 `;
 body.appendChild(lotRow);
 });
 
 header.onclick = () => {
 const isExpanded = body.classList.toggle('show');
 header.classList.toggle('expanded', isExpanded);
 };
 
 card.appendChild(header);
 card.appendChild(body);
 list.appendChild(card);
 });
 }

 async function loadStock() {
 try {
 const [dep, mag] = await Promise.all([
 fetch('/api/stock?warehouse=depozit').then(r => r.json()),
 fetch('/api/stock?warehouse=magazin').then(r => r.json())
 ]);
 
 allStock = [
 ...dep.map(s => ({...s, warehouse: s.warehouse || 'depozit'})),
 ...mag.map(s => ({...s, warehouse: 'magazin'}))
 ];
 
 document.getElementById('badge-depozit').textContent = dep.reduce((a,s) => a + Number(s.qty), 0);
 document.getElementById('badge-magazin').textContent = mag.reduce((a,s) => a + Number(s.qty), 0);
 
 // a CORECtIE: Numara PRODUSELE UNICE cu stoc mic, nu loturile
 function countLowProducts(stockArray) {
 const productTotals = {};
 
 // Grupeaza dupa nume produs ti calculeaza total
 stockArray.forEach(item => {
 const key = item.productName;
 if (!productTotals[key]) productTotals[key] = 0;
 productTotals[key] += Number(item.qty || 0);
 });
 
 // Numara caate produse au total < 30
 return Object.values(productTotals).filter(total => total < 30).length;
 }
 
 const lowDep = countLowProducts(dep);
 const lowMag = countLowProducts(mag);
 
 // Functie pentru a obtine produsele cu stoc mic
 function getLowStockProducts(stockArray) {
 const productTotals = {};
 stockArray.forEach(item => {
 const key = item.productName;
 if (!productTotals[key]) productTotals[key] = { name: item.productName, total: 0 };
 productTotals[key].total += Number(item.qty || 0);
 });
 return Object.values(productTotals).filter(p => p.total < 30).sort((a,b) => a.total - b.total);
 }
 
 const lowDepProducts = getLowStockProducts(dep);
 const lowMagProducts = getLowStockProducts(mag);
 
 const alerts = document.getElementById('alertsContainer');
 alerts.innerHTML = '';
 
 // Alert Depozit cu accordion
 if (lowDep) {
 const depList = lowDepProducts.map(p => `<div style="padding: 4px 0; border-bottom: 1px solid var(--border-color);">${p.name} <span style="color: var(--danger);">(${p.total} buc)</span></div>`).join('');
 alerts.innerHTML += `
 <div class="alert-accordion">
 <div class="alert-header" onclick="toggleAlert('alert-dep')">
 <span>&#9888; Depozit: ${lowDep} ${lowDep === 1 ? 'produs' : 'produse'} sub 30 buc</span>
 <span class="alert-arrow" id="arrow-dep">&#9660;</span>
 </div>
 <div class="alert-content" id="alert-dep" style="display: none;">
 ${depList}
 </div>
 </div>`;
 }
 
 // Alert Magazin cu accordion
 if (lowMag) {
 const magList = lowMagProducts.map(p => `<div style="padding: 4px 0; border-bottom: 1px solid var(--border-color);">${p.name} <span style="color: var(--danger);">(${p.total} buc)</span></div>`).join('');
 alerts.innerHTML += `
 <div class="alert-accordion">
 <div class="alert-header" onclick="toggleAlert('alert-mag')">
 <span>&#9888; Magazin: ${lowMag} ${lowMag === 1 ? 'produs' : 'produse'} sub 30 buc</span>
 <span class="alert-arrow" id="arrow-mag">&#9660;</span>
 </div>
 <div class="alert-content" id="alert-mag" style="display: none;">
 ${magList}
 </div>
 </div>`;
 }
 
 switchTab(currentTab);
 } catch (e) {
 console.error(e);
 document.getElementById('inventoryList').innerHTML = '<p class="hint">Eroare la incarcare</p>';
 }
}
 function switchTab(tab) {
 currentTab = tab;
 
 document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
 const btn = document.querySelector(`[onclick="switchTab('${tab}')"]`);
 if (btn) btn.classList.add('active');
 
 let filtered = allStock;
 if (tab !== 'total') {
 filtered = allStock.filter(s => s.warehouse === tab || (tab === 'depozit' && !s.warehouse));
 }
 
 renderStock(filtered);
 
 const total = filtered.reduce((a,s) => a + Number(s.qty), 0);
 document.getElementById('totalCount').textContent = total;
 }

 function filterStock() {
 const q = document.getElementById('stockSearch').value.toLowerCase();
 let base = allStock;
 if (currentTab !== 'total') {
 base = allStock.filter(s => s.warehouse === currentTab || (currentTab === 'depozit' && !s.warehouse));
 }
 const filtered = base.filter(s => 
 (s.productName || '').toLowerCase().includes(q) ||
 (s.lot || '').toLowerCase().includes(q)
 );
 renderStock(filtered);
 document.getElementById('totalCount').textContent = filtered.reduce((a,s) => a + Number(s.qty), 0);
 }
 
 // Toggle accordion alert
 function toggleAlert(id) {
 const content = document.getElementById(id);
 const arrow = document.getElementById('arrow-' + id.split('-')[1]);
 if (content.style.display === 'none') {
 content.style.display = 'block';
 arrow.innerHTML = '&#9650;';
 } else {
 content.style.display = 'none';
 arrow.innerHTML = '&#9660;';
 }
 }

 // Edit Modal Functions
 function openEdit(lotId, event) {
 event.stopPropagation();
 
 const lot = allStock.find(s => s.id === lotId);
 if (!lot) return;
 
 document.getElementById('editId').value = lotId;
 document.getElementById('editProdName').textContent = lot.productName;
 document.getElementById('editLot').textContent = lot.lot;
 document.getElementById('editWarehouse').textContent = lot.warehouse === 'magazin' ? '&#127978; Magazin' : '&#127981; Depozit';
 document.getElementById('editQty').value = lot.qty;
 
 // Gestioneaza locatia (ascuns pentru magazin)
 const locBox = document.getElementById('editLocationBox');
 if (lot.warehouse === 'magazin') {
 locBox.style.display = 'none';
 } else {
 locBox.style.display = 'block';
 document.getElementById('editLocation').value = lot.location || 'A';
 }
 
 document.getElementById('editModal').classList.add('show');
 }

 function closeModal() {
 document.getElementById('editModal').classList.remove('show');
 }

 async function saveEdit() {
 const id = document.getElementById('editId').value;
 const qty = document.getElementById('editQty').value;
 const location = document.getElementById('editLocation').value;
 
 try {
 const res = await fetch(`/api/stock/${id}`, {
 method: 'PUT',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({ qty: Number(qty), location })
 });
 
 if (res.ok) {
 closeModal();
 loadStock(); // Reincarca
 } else {
 alert('Eroare la salvare');
 }
 } catch (e) {
 alert('Eroare de retea');
 }
 }

 async function deleteLot(lotId, productName, event) {
 event.stopPropagation();
 
 if (!confirm(`ttergi LOT-ul pentru ${productName}?\nActiunea este ireversibila!`)) return;
 
 try {
 const res = await fetch(`/api/stock/${lotId}`, { method: 'DELETE' });
 if (res.ok) loadStock();
 else alert('Eroare la ttergere');
 } catch (e) {
 alert('Eroare de retea');
 }
 }

 // Inchide modal la click pe overlay
 document.getElementById('editModal').onclick = (e) => {
 if (e.target.id === 'editModal') closeModal();
 };

 // Load initial
 loadStock();
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventar Stoc</title>

  
  <link rel="stylesheet" href="checkstockhtml.css" />
  <link rel="stylesheet" href="global.css">
</head>
<body>
  <div class="csApp">

    <!-- TOP BAR -->
    <header class="csTop">
      <div class="csBrand">
        📦 <span>Fast Medical Distribution</span>
      </div>

      <button class="csBack" type="button" onclick="location.href='index.html'">
        ↩ Înapoi
      </button>
    </header>

    <!-- PAGE TITLE -->
    <div class="csHeader">
      <h1>Inventar Stoc</h1>
    </div>

    <!-- SEARCH + REFRESH -->
    <div class="csTools">
      <div class="csSearch">
        <span class="csSearchIcon">🔎</span>
        <input id="stockSearch" type="text" placeholder="Caută produs..." />
      </div>

      <button id="btnRefresh" class="csRefresh" type="button">
        ↻ Refresh
      </button>
    </div>

    <!-- LIST -->
    <main id="stockList" class="csList">
      <!-- populat din JS -->
    </main>

    <!-- BOTTOM TOTAL (sticky) -->
    <footer class="csBottom">
      <div class="csTotalPill">
        <span class="csTotalLabel">Total:</span>
        <span id="inventoryTotal" class="csTotalValue">0 buc</span>
      </div>

      <!-- (opțional) bară jos ca în poză; dacă nu vrei, șterge blocul -->
      <nav class="csNav">
        <button type="button" onclick="location.href='index.html'">🏠</button>
        <button type="button" onclick="location.href='checkprice.html'">🔎</button>
        <button type="button" onclick="location.href='orders.html'">🧾</button>
        <button type="button" onclick="location.href='stock.html'">➕</button>
      </nav>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>

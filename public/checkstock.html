<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventar Stoc</title>
  <link rel="stylesheet" href="checkstockhtml.css" />
</head>
<body>

  <div class="csApp">

    <!-- TOP BAR -->
    <div class="csTopbar">
      <button class="csBack" onclick="location.href='index.html'">← Înapoi</button>

      <div class="csTitle">
        <span class="csIcon">📦</span>
        <span>Inventar Stoc</span>
      </div>

      <button id="btnRefresh" class="csRefresh">🔄 Refresh</button>
    </div>

    <!-- SEARCH -->
    <div class="csSearchWrap">
      <div class="csSearch">
        <span class="csSearchIcon">🔎</span>
        <input id="stockSearch" type="text" placeholder="Caută produs..." />
      </div>
    </div>

    <!-- LIST -->
    <div id="stockList" class="csList"></div>

    <!-- TOTAL -->
    <div class="csTotalBar">
      <div class="csTotalInner">
        <span class="csTotalLabel">Total:</span>
        <span id="inventoryTotal" class="csTotalValue">0 buc</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

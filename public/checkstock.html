<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Inventar Stoc - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .inventory-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    @media (min-width: 640px) {
      .inventory-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .inventory-search {
      position: relative;
      flex: 1;
      max-width: 500px;
    }

    .inventory-search input {
      padding-left: var(--space-10);
    }

    .inventory-search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.25rem;
    }

    .inventory-total {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      color: white;
      padding: var(--space-4) var(--space-6);
      border-radius: var(--radius-xl);
      text-align: center;
      box-shadow: var(--shadow-lg);
    }

    .inventory-total-label {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-bottom: var(--space-1);
    }

    .inventory-total-value {
      font-size: 1.75rem;
      font-weight: 800;
    }

    .product-group {
      margin-bottom: var(--space-5);
    }

    .product-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      cursor: pointer;
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }

    .product-group-header:hover {
      border-color: rgba(148, 163, 184, 0.3);
    }

    .product-group-header.expanded {
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-bottom-color: transparent;
    }

    .product-group-name {
      font-weight: 700;
      font-size: 1.0625rem;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .product-group-badge {
      background: var(--primary-600);
      color: white;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 700;
    }

    .product-group-toggle {
      color: var(--text-muted);
      transition: transform var(--transition-fast);
    }

    .product-group-header.expanded .product-group-toggle {
      transform: rotate(180deg);
    }

    .product-group-content {
      display: none;
      padding: var(--space-3);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    .product-group-header.expanded + .product-group-content {
      display: block;
    }

    .lot-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .lot-card:last-child {
      margin-bottom: 0;
    }

    .lot-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-3);
    }

    .lot-info h4 {
      margin: 0 0 var(--space-1) 0;
      font-size: 1rem;
    }

    .lot-meta {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .lot-qty {
      font-size: 1.25rem;
      font-weight: 800;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      min-width: 80px;
      text-align: center;
    }

    .lot-qty.good {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success-400);
    }

    .lot-qty.medium {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning-500);
    }

    .lot-qty.low {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger-500);
    }

    .lot-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .lot-actions .btn {
      padding: var(--space-3);
      font-size: 0.875rem;
    }

    .lot-edit-form {
      display: none;
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border-color);
    }

    .lot-edit-form.active {
      display: block;
    }

    .lot-edit-form .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    @media (max-width: 480px) {
      .lot-edit-form .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .low-stock-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-500);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .low-stock-alert-icon {
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions"><div id="userBar"></div>
        <a href="index.html" class="btn btn-ghost btn-sm">← Înapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1 style="margin-bottom: var(--space-5);">Inventar Stoc</h1>

    <!-- Alertă stoc mic -->
    <div class="low-stock-alert" id="lowStockAlert" style="display: none;">
      <span class="low-stock-alert-icon">⚠️</span>
      <div>
        <strong>Atenție!</strong> <span id="lowStockCount">0</span> produse au stoc sub limita minimă.
      </div>
    </div>

    <!-- Header cu search și total -->
    <div class="inventory-header">
      <div class="inventory-search">
        <span class="inventory-search-icon">🔍</span>
        <input type="text" id="stockSearch" class="form-input" placeholder="Caută produs, lot sau locație..." />
      </div>
      <div class="inventory-total">
        <div class="inventory-total-label">Total bucăți în stoc</div>
        <div class="inventory-total-value" id="inventoryTotal">0</div>
      </div>
    </div>

    <!-- Lista produse grupată -->
    <div id="stockList">
      <!-- Populat din JS -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

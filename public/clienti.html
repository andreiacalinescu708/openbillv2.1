<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administrare clienți</title>
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="global.css">
  
  <style>
    /* Design System - Dark Medical Theme */
    :root {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #ffffff;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --accent-blue: #0284c7;
      --accent-hover: #0369a1;
      --border-color: #334155;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Topbar consistent cu aplicația */
    .topbar {
      background: var(--accent-blue);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar h2 {
      font-size: 1.5rem;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .btnBack {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btnBack:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    #userBar {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    /* Layout principal */
    .page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* Carduri moderne */
    .card {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
    }

    .card h3 {
      color: var(--text-primary);
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--accent-blue);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card h4 {
      color: var(--text-secondary);
      font-size: 1.2rem;
      margin: 1.5rem 0 1rem 0;
    }

    /* Input-uri moderne */
    .input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--bg-input);
      color: #1e293b;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
    }

    /* Form layout îmbunătățit */
    .formRow {
      margin-bottom: 1.25rem;
    }

    .formRow label {
      display: block;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    /* Butoane moderne */
    .btnPrimary {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 0.875rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.3);
    }

    .btnPrimary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 8px -1px rgba(2, 132, 199, 0.4);
    }

    .btnSecondary {
      background: transparent;
      color: var(--text-secondary);
      border: 2px dashed var(--border-color);
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .btnSecondary:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(2, 132, 199, 0.1);
    }

    /* Listă clienți */
    .list {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 0.75rem;
      padding: 1rem;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
    }

    .list:empty::before {
      content: "Niciun client găsit";
      color: var(--text-secondary);
      font-style: italic;
      display: block;
      text-align: center;
      padding: 2rem;
    }

    /* Item client în listă */
    .client-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .client-item:hover {
      border-color: var(--accent-blue);
      transform: translateX(4px);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
    }

    .client-item.active {
      background: rgba(2, 132, 199, 0.2);
      border-color: var(--accent-blue);
    }

    /* Secțiune prețuri speciale */
    #specialPricesBox {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin: 1rem 0;
      border: 1px solid var(--border-color);
    }

    .special-price-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: end;
    }

    /* Detalii client */
    #clientDetails {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      min-height: 200px;
    }

    #clientDetails:empty::before {
      content: "Selectați un client pentru a vedea detaliile";
      color: var(--text-secondary);
      font-style: italic;
      display: block;
      text-align: center;
      padding: 3rem;
    }

    /* Mesaje */
    .hint {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
    }

    .hint.success {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .hint.error {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Separatoare */
    hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      margin: 2rem 0;
    }

    /* Scrollbar modern */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-hover);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .page {
        padding: 0 1rem;
        margin: 1rem auto;
      }
      
      .card {
        padding: 1.5rem;
      }
      
      .topbar {
        padding: 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      
      .special-price-row {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
    }

    /* Stiluri pentru elementele generate dinamic de script.js */
    .client-group-header {
      color: var(--accent-blue);
      font-weight: 600;
      font-size: 1.1rem;
      margin: 1.5rem 0 0.75rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .client-group-header:first-child {
      margin-top: 0;
    }

    .price-tag {
      background: var(--accent-blue);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.5rem;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.4);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="btnBack">← Înapoi</a>
    <h2>Administrare clienți</h2>
    <div id="userBar"></div>
  </div>

  <div class="page">
    <!-- Secțiunea de căutare și listă -->
    <div class="card">
      <h3>📋 Lista clienți</h3>
      
      <div class="formRow">
        <input id="clientsSearch" class="input" placeholder="Caută client după nume..." autocomplete="off" />
      </div>

      <div id="clientsList" class="list"></div>
    </div>

    <!-- Formular adăugare client -->
    <div class="card">
      <h3>➕ Adaugă client nou</h3>

      <form id="addClientForm">
        <div class="formRow">
          <label>Nume firmă / farmacie</label>
          <input id="newClientName" class="input" placeholder="ex: Farmacia Tei" required />
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="formRow">
            <label>Grup</label>
            <select id="newClientGroup" class="input">
              <option value="Craiova">Craiova</option>
              <option value="Exterior">Exterior</option>
            </select>
          </div>

          <div class="formRow">
            <label>Categorie / Zonă</label>
            <input id="newClientCategory" class="input" placeholder="ex: Vâlcea" />
          </div>
        </div>

        <hr />

        <h4>💰 Prețuri speciale (opțional)</h4>
        <div id="specialPricesBox"></div>

        <button type="button" id="btnAddSpecialPrice" class="btnSecondary">
          ➕ Adaugă preț special
        </button>

        <br /><br />

        <button type="submit" class="btnPrimary">
          💾 Salvează client
        </button>

        <div id="clientMsg" class="hint" style="display: none;"></div>
      </form>
    </div>

    <!-- Detalii client -->
    <div class="card" style="margin-top: 2rem;">
      <h3>👤 Detalii client</h3>
      <div id="clientDetails"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administrare clienți</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="btnBack">← Înapoi</a>
    <h2>Administrare clienți</h2>
    <div id="userBar"></div>
  </div>

  <div class="page">
    <div class="card">
      <h3>Clienți</h3>

      <input id="clientsSearch" class="input" placeholder="Caută client..." />

      <div id="clientsList" class="list"></div>

      <hr />
<hr />

<h3>Adaugă client</h3>

<form id="addClientForm">
  <div class="formRow">
    <label>Nume</label>
    <input id="newClientName" class="input" placeholder="ex: Farmacia X" />
  </div>

  <div class="formRow">
    <label>Grup</label>
    <select id="newClientGroup" class="input">
      <option value="Craiova">Craiova</option>
      <option value="Exterior">Exterior</option>
    </select>
  </div>

  <div class="formRow">
    <label>Categorie</label>
    <input id="newClientCategory" class="input" placeholder="ex: Vâlcea" />
  </div>

  <hr />

  <h4>Prețuri speciale</h4>
  <div id="specialPricesBox"></div>

  <button type="button" id="btnAddSpecialPrice" class="btnSecondary">
    ➕ Adaugă preț special
  </button>

  <br /><br />

  <button type="submit" class="btnPrimary">💾 Salvează client</button>

  <div id="clientMsg" class="hint"></div>
</form>

<hr />

<h3>Detalii client</h3>
<div id="clientDetails" class="card"></div>


  <script src="script.js"></script>
</body>
</html>

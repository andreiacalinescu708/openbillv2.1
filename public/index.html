<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acasă</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="indexhtml.css" />
</head>

<body>
  <header class="topbar">
    <div class="left-actions">
      <span class="brand-dot"></span>
      <div class="brand">
        <div class="brand-title">Fast Medical Distribution</div>
        <div class="brand-sub">Panou principal</div>
      </div>
    </div>

    <div class="actions">
      <button id="btnToggleTheme" class="iconbtn" title="Schimbă tema" aria-label="Schimbă tema">
        🌙
      </button>
    </div>
  </header>

  <!-- user chip + logout (stilizat din CSS) -->
  <div id="userBar" class="user-bar"></div>

  <main class="container">
    <div class="hub">
      <!-- DEPOZIT -->
      <section class="hub-card">
        <div class="hub-head">
          <div class="hub-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 10.5L12 5l9 5.5v10.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M7 22V13h10v9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M9 16h2M13 16h2M9 19h2M13 19h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h2>Depozit</h2>
            <p>Recepție, stoc, comenzi</p>
          </div>
        </div>

        <div class="hub-actions">
          <a class="hub-btn primary" href="stock.html">Recepție marfă</a>
          <a class="hub-btn" href="checkstock.html">Inventar stoc</a>
          <a class="hub-btn" href="orders.html">Comenzi</a>
        </div>
      </section>

      <!-- TEREN -->
      <section class="hub-card">
        <div class="hub-head">
          <div class="hub-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M6 20c4-7 8-7 12 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M4 6h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6 6l2 8M18 6l-2 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M12 10v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h2>Teren</h2>
            <p>Comenzi și prețuri</p>
          </div>
        </div>

        <div class="hub-actions">
          <a class="hub-btn primary" href="adauga_comanda.html">Lista Clienti</a>
          <a class="hub-btn" href="checkprice.html">Produse Si Preturi</a>
        </div>
      </section>

      <!-- BIROU -->
      <section class="hub-card">
        <div class="hub-head">
          <div class="hub-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 3h7l3 3v15a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M14 3v4a1 1 0 0 0 1 1h4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M8 12h8M8 16h8M8 20h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h2>Birou</h2>
            <p>Exporturi & administrare</p>
          </div>
        </div>

        <div class="hub-actions">
          <a class="hub-btn disabled" href="#" onclick="return false;">CSV / Import (în curând)</a>
          <a class="hub-btn" href="clienti.html">Administrare clienți</a>
        </div>
      </section>
    </div>
  </main>

  <!-- bottom nav ca în Design 1 -->
  <nav class="bottom-nav" aria-label="Navigare">
    <a class="bn-item active" href="index.html" aria-current="page">
      <span class="bn-ico">🏠</span>
      <span class="bn-txt">Dashboard</span>
    </a>
    <a class="bn-item" href="stock.html">
      <span class="bn-ico">📦</span>
      <span class="bn-txt">Depozit</span>
    </a>
    <a class="bn-item" href="adauga_comanda.html">
      <span class="bn-ico">🚚</span>
      <span class="bn-txt">Teren</span>
    </a>
    <a class="bn-item" href="clienti.html">
      <span class="bn-ico">🏢</span>
      <span class="bn-txt">Birou</span>
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>

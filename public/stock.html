<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Recepționare Marfă</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="brand">⚕️ Fast Medical Distribution</span>
  </div>

  <div class="topbar-center">
    <!-- opțional: breadcrumb / titlu pagină -->
  </div>

  <div class="topbar-right">
    <button id="btnToggleTheme" class="icon-btn">🌙</button>
    <div id="userBar"></div>
  </div>
</header>


<main class="container">

 <div class="card">
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="btn" onclick="location.href='index.html'">⬅️ Înapoi</button>
    <h3 style="margin:0;">Adaugă stoc</h3>
  </div>

    <label>Scanare QR</label>
<input id="qrInput" placeholder="Scanează codul QR aici" autofocus />


    <label>Produs</label>
    <select id="stockProduct"></select>

    <label>LOT</label>
    <input id="stockLot" placeholder="LOT-XXXX" />

    <label>Data expirare</label>
    <input id="stockExpire" type="date" />

    <label>Cantitate</label>
    <input id="stockQty" type="number" min="1" />

    <button id="btnAddStock">➕ Adaugă în stoc</button>
  </div>

  <div class="card">
    <h3>Stoc existent</h3>
    <div id="stockList"></div>
  </div>

</main>
<!-- QR POPUP -->
<div id="qrModal" class="modal" style="display:none;">
  <div class="modal-card">
    <h3 style="margin:0 0 8px;">Scanare cod</h3>
    <p style="margin:0 0 12px; color:#666;">Alege cum vrei să introduci codul QR.</p>

    <div class="modal-actions">
      <button id="btnScanCamera" class="btn primary">📷 Scanează cu camera</button>
      <button id="btnManualQr" class="btn">✍️ Introdu manual</button>
    </div>

    <div id="qrScannerBox" style="display:none; margin-top:12px;">
      <video id="qrVideo" playsinline style="width:100%; border-radius:12px; background:#000;"></video>

      <div style="display:flex; gap:8px; margin-top:10px;">
        <button id="btnStopScan" class="btn">⛔ Oprește</button>
        <button id="btnCloseQrModal" class="btn">Închide</button>
      </div>

      <div id="qrScanMsg" style="margin-top:10px; color:#666;"></div>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-top:12px;">
      <button id="btnCloseQrModal2" class="btn">Închide</button>
    </div>
  </div>
</div>


<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recepție marfă</title>

  <!-- Dacă vrei să păstrezi și stilurile globale, lasă și style.css -->
  <!-- <link rel="stylesheet" href="style.css" /> -->
 <link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="stockhtml.css" />
</head>
<body>

  <!-- TOP APP BAR (ca în poză) -->
  <header class="appbar">
    <div class="appbar-left">
      <div class="app-logo">⚕️</div>
      <div class="app-title">
        <div class="app-name">Fast Medical Distribution</div>
        <div class="app-sub">Recepție marfă</div>
      </div>
    </div>

    <div class="appbar-right">
      <div id="userBar" class="userbar"></div>
      <!-- buton logout e deja în userBar-ul tău -->
    </div>
  </header>

  <main class="screen">

    <!-- CARD: ADAUGĂ STOC -->
    <section class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Adaugă stoc</div>
        </div>

        <button type="button" class="btn-scan" id="btnScanQR">
          <span class="btn-scan-ic">📷</span>
          <span>Scanează</span>
        </button>
      </div>

      <div class="field">
        <div class="label">Scanare cod</div>
        <div class="input-wrap">
          <input id="qrInput" class="input" placeholder="Scanează / lipește codul aici" />
        </div>
      </div>

      <div class="field">
        <div class="label">Produs</div>
        <div class="select-wrap">
          <select id="stockProduct" class="select"></select>
          <div id="stockAutoOk" class="auto-ok">✓</div>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <div class="label">LOT</div>
          <input id="stockLot" class="input" placeholder="LOT-XXXX" />
        </div>

        <div class="field">
          <div class="label">Expiră</div>
          <input id="stockExpire" class="input" type="date" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <div class="label">Locație</div>
          <select id="stockLocation" class="select">
            <option value="A">Locație A</option>
            <option value="B">Locație B</option>
            <option value="C">Locație C</option>
            <option value="R1">Raft R1</option>
            <option value="R2">Raft R2</option>
            <option value="R3">Raft R3</option>
          </select>
        </div>

        <div class="field">
          <div class="label">Cantitate</div>
          <input id="stockQty" class="input" type="number" min="1" placeholder="0" />
        </div>
      </div>

      <button id="btnAddStock" class="btn-cta">Adaugă în stoc</button>
    </section>

    <!-- CARD: STOC EXISTENT -->
    <section class="card">
      <div class="card-head simple">
        <div class="card-title">Stoc existent</div>
      </div>

      <div id="stockList" class="stock-list"></div>
    </section>

  </main>

  <!-- SCANNER MODAL -->
  <div id="scannerModal" class="modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Scanner</div>
        <button type="button" id="btnCloseScan" class="btn-x">✖</button>
      </div>

      <video id="scanVideo" autoplay playsinline muted class="modal-video"></video>

      <div class="modal-hint">
        Țintește codul (DataMatrix/QR). După citire se închide automat.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

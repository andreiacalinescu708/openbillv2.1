<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Recepționare Marfă</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="brand">⚕️ Fast Medical Distribution</span>
  </div>

  <div class="topbar-center">
    <!-- opțional: breadcrumb / titlu pagină -->
  </div>

  <div class="topbar-right">
    <button id="btnToggleTheme" class="icon-btn">🌙</button>
    <div id="userBar"></div>
  </div>
</header>


<main class="container">

 <div class="card">
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="btn" onclick="location.href='index.html'">⬅️ Înapoi</button>
    <h3 style="margin:0;">Adaugă stoc</h3>
  </div>

   <label>Scanare cod</label>
<div style="display:flex; gap:10px; align-items:center;">
  <input id="qrInput" placeholder="Scanează / lipește codul aici" style="flex:1;" />
  <button type="button" id="btnScanQR" class="btn">📷 Scanează</button>
</div>



    <label>Produs</label>
    <select id="stockProduct"></select>

    <label>LOT</label>
    <input id="stockLot" placeholder="LOT-XXXX" />

    <label>Data expirare</label>
    <input id="stockExpire" type="date" />

    <label>Cantitate</label>
    <label>Locație</label>
<select id="stockLocation">
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="R1">R1</option>
  <option value="R2">R2</option>
  <option value="R3">R3</option>
</select>

    <input id="stockQty" type="number" min="1" />

    <button id="btnAddStock">➕ Adaugă în stoc</button>
  </div>

  <div class="card">
    <h3>Stoc existent</h3>
    <div id="stockList"></div>
  </div>

</main>
<!-- SCANNER MODAL (nou) -->
<div id="scannerModal" class="modal" style="display:none;">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <strong>Scanner</strong>
      <button type="button" id="btnCloseScan" class="btn">✖</button>
    </div>

   <video
  id="scanVideo"
  autoplay
  playsinline
  muted
  style="width:100%; border-radius:12px; background:#000; margin-top:10px;">
</video>


    <p style="margin-top:10px; color:#666;">
      Țintește codul (DataMatrix/QR). După citire se închide automat.
    </p>
  </div>
</div>



<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Pregătire comandă</title>
  
  <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="pickingorder.css">
</head>
<body>

<header class="topbar">
  <button onclick="location.href='orders.html'">⬅ Înapoi</button>
  <h2>📦 Pregătire comandă</h2>
<div id="userBar"></div></header>

<main class="container">
  <div id="pickingInfo" class="panel"></div>
  <div id="pickingList" class="panel"></div>
    <!-- Scanner 2D Android - Input pentru mod tastatură -->
  <div class="panel" style="margin-top: 16px; background: rgba(59,130,246,0.1); border: 2px solid #3b82f6;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
      <span style="font-size:24px;">📲</span>
      <div>
        <strong>Scanner 2D Android</strong>
        <div style="font-size:12px; color:#94a3b8;">Scanează codul de bare aici (mod tastatură)</div>
      </div>
    </div>
    <input 
      type="text" 
      id="scanner2DInput" 
      placeholder="Aștept scanare..." 
      style="
        width:100%; 
        padding:12px; 
        font-size:16px; 
        font-family:monospace;
        background:#0f172a; 
        border:1px solid #334155; 
        border-radius:8px;
        color:#f8fafc;
      "
      autocomplete="off"
    />
    <div id="scannerFeedback" style="margin-top:8px; font-size:13px; color:#10b981; display:none;">
      ✅ Cod scanat cu succes
    </div>
  </div>

  <div style="margin-top:16px; text-align:right;">
    <button id="btnScanPick" class="btn primary">📷 Scanează produs</button>
    <button id="btnFinishPick" class="btn">✅ Finalizează</button>
  </div>
</main>

<!-- scanner -->
<div id="scannerModal" class="modal" style="display:none;">
  <div class="modal-card">
    <button id="btnCloseScan" class="btn">✖</button>
    <video id="scanVideo"></video>
  </div>
</div>


<!-- ✅ PICK MODAL (cantitate + replace lot) -->
<div id="pickModal" class="modal" style="display:none;">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalHead">
      <div>
        <div id="pickModalTitle" class="modalTitle">Picking</div>
        <div class="modalSub">
          <span id="pickModalProduct">—</span>
        </div>
      </div>
      <button id="pickModalClose" class="modalX">✕</button>
    </div>

    <div class="modalBody">
      <div class="modalGrid">
        <div><small>GTIN comandă</small><div id="pickModalGtin">—</div></div>
        <div><small>Locație</small><div id="pickModalLocation">—</div></div>
        <div><small>LOT scanat</small><div id="pickModalScannedLot">—</div></div>

        <div id="pickModalPlannedRow" style="display:none;">
          <small>LOT din comandă</small>
          <div id="pickModalPlannedLot">—</div>
        </div>

        <div>
          <small>Rămas pe produs (comandă)</small>
          <div id="pickModalRemainingOrder">—</div>
        </div>
      </div>

      <div class="qtyRow">
        <label for="pickModalQty">Cantitate</label>
        <input id="pickModalQty" type="number" min="1" value="1" />
      </div>

      <div id="pickModalHint" class="hintBox"></div>
    </div>

    <div class="modalFoot">
      <button id="pickModalBtnCancel" class="btn ghost">Anulează</button>
      <button id="pickModalBtnAdd" class="btn ok">Adaugă</button>
      <button id="pickModalBtnReplaceLot" class="btn warn" style="display:none;">
        Actualizează LOT
      </button>
    </div>
  </div>
</div>

<!-- ✅ DEBUG BOX (ca să vezi pe telefon ce se întâmplă) -->
<div id="debugBox" style="
  position:fixed; left:10px; right:10px; bottom:10px;
  background:#111; color:#0f0; padding:8px 10px;
  font-size:12px; border-radius:10px; z-index:99999;
  max-height:120px; overflow:auto; display:none;
"></div>



<script src="script.js"></script>
</body>
</html>

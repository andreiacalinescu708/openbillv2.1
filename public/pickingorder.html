<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Pregătire comandă</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pickingorder.css">
</head>
<body>

<header class="topbar">
  <button onclick="location.href='orders.html'">⬅ Înapoi</button>
  <h2>📦 Pregătire comandă</h2>
</header>

<main class="container">
  <div id="pickingInfo" class="panel"></div>
  <div id="pickingList" class="panel"></div>

  <div style="margin-top:16px; text-align:right;">
    <button id="btnScanPick" class="btn primary">📷 Scanează produs</button>
    <button id="btnFinishPick" class="btn">✅ Finalizează</button>
  </div>
</main>

<!-- scanner -->
<div id="scannerModal" class="modal" style="display:none;">
  <div class="modal-card">
    <button id="btnCloseScan" class="btn">✖</button>
    <video id="scanVideo"></video>
  </div>
</div>

<!-- ✅ PICKING MODAL (cantitate + actualizează lot) -->
<div id="pickModal" class="modal" style="display:none;">
  <div class="modalCard">
    <button id="pickModalClose" class="modalClose" type="button">✕</button>

    <h3 id="pickModalTitle" class="modalTitle">Picking</h3>

    <div class="modalBody">
      <div class="modalRow">
        <div class="modalLabel">Produs</div>
        <div id="pickModalProduct" class="modalValue">—</div>
      </div>

      <div class="modalRow">
        <div class="modalLabel">GTIN comandă</div>
        <div id="pickModalGtin" class="modalValue">—</div>
      </div>

      <div class="modalRow">
        <div class="modalLabel">LOT scanat</div>
        <div id="pickModalScannedLot" class="modalValue">—</div>
      </div>
      <div class="modalRow">
  <div class="modalLabel">Locație lot scanat</div>
  <div id="pickModalLocation" class="modalValue">—</div>
</div>

<div class="modalRow">
  <div class="modalLabel">Rămas pe comandă</div>
  <div id="pickModalRemainingOrder" class="modalValue">—</div>
</div>


      <div class="modalRow" id="pickModalPlannedRow" style="display:none;">
        <div class="modalLabel">LOT în comandă</div>
        <div id="pickModalPlannedLot" class="modalValue">—</div>
      </div>

      <div class="modalRow">
        <label class="modalLabel" for="pickModalQty">Cantitate</label>
        <input id="pickModalQty" class="modalInput" type="number" min="1" value="1" />
        <div id="pickModalHint" class="modalHint"></div>
      </div>

      <div class="modalActions">
        <button id="pickModalBtnAdd" class="btnPrimary" type="button">Adaugă</button>
        <button id="pickModalBtnReplaceLot" class="btnDanger" type="button" style="display:none;">
          Actualizează LOT
        </button>
        <button id="pickModalBtnCancel" class="btnGhost" type="button">Anulează</button>
      </div>
    </div>
  </div>
</div>
<!-- ✅ PICK MODAL (cantitate + replace lot) -->
<div id="pickModal" class="modal" style="display:none;">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalHead">
      <div>
        <div id="pickModalTitle" class="modalTitle">Picking</div>
        <div class="modalSub">
          <span id="pickModalProduct">—</span>
        </div>
      </div>
      <button id="pickModalClose" class="modalX">✕</button>
    </div>

    <div class="modalBody">
      <div class="modalGrid">
        <div><small>GTIN comandă</small><div id="pickModalGtin">—</div></div>
        <div><small>Locație</small><div id="pickModalLocation">—</div></div>
        <div><small>LOT scanat</small><div id="pickModalScannedLot">—</div></div>

        <div id="pickModalPlannedRow" style="display:none;">
          <small>LOT din comandă</small>
          <div id="pickModalPlannedLot">—</div>
        </div>

        <div>
          <small>Rămas pe produs (comandă)</small>
          <div id="pickModalRemainingOrder">—</div>
        </div>
      </div>

      <div class="qtyRow">
        <label for="pickModalQty">Cantitate</label>
        <input id="pickModalQty" type="number" min="1" value="1" />
      </div>

      <div id="pickModalHint" class="hintBox"></div>
    </div>

    <div class="modalFoot">
      <button id="pickModalBtnCancel" class="btn ghost">Anulează</button>
      <button id="pickModalBtnAdd" class="btn ok">Adaugă</button>
      <button id="pickModalBtnReplaceLot" class="btn warn" style="display:none;">
        Actualizează LOT
      </button>
    </div>
  </div>
</div>

<!-- ✅ DEBUG BOX (ca să vezi pe telefon ce se întâmplă) -->
<div id="debugBox" style="
  position:fixed; left:10px; right:10px; bottom:10px;
  background:#111; color:#0f0; padding:8px 10px;
  font-size:12px; border-radius:10px; z-index:99999;
  max-height:120px; overflow:auto; display:none;
"></div>



<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Istoric Comenzi - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .page-header {
      margin-bottom: var(--space-6);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--primary-400);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: var(--space-4);
    }

    .back-link:hover {
      color: var(--primary-300);
    }

    .client-info {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(34, 197, 94, 0.1));
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .client-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }

    .client-meta {
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      text-align: center;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--primary-400);
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: var(--space-1);
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .order-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-5);
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }

    .order-id {
      font-family: monospace;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .order-date {
      font-weight: 600;
      font-size: 1.125rem;
      margin-top: var(--space-1);
    }

    .order-status {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-in_procesare { 
      background: rgba(234, 179, 8, 0.2); 
      color: #fbbf24; 
      border: 1px solid rgba(234, 179, 8, 0.3);
    }
    .status-facturata { 
      background: rgba(59, 130, 246, 0.2); 
      color: #60a5fa; 
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .status-gata_de_livrare { 
      background: rgba(168, 85, 247, 0.2); 
      color: #c084fc; 
      border: 1px solid rgba(168, 85, 247, 0.3);
    }
    .status-livrata { 
      background: rgba(34, 197, 94, 0.2); 
      color: #4ade80; 
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .order-body {
      padding: var(--space-5);
    }

    .order-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .item-details {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .item-qty {
      font-weight: 700;
      color: var(--primary-400);
      font-size: 1.125rem;
    }

    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 2px solid var(--border-color);
    }

    .order-total-label {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .order-total-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-400);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-12) var(--space-6);
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
    }

    .empty-icon {
      font-size: 5rem;
      margin-bottom: var(--space-6);
      opacity: 0.3;
    }

    .empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .loading-spinner {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 3px solid rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary-500);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: var(--space-4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-3);
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary-400);
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: var(--space-2);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions"><div id="userBar"></div>
        <a href="client.html" class="btn btn-ghost btn-sm">← Înapoi la client</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <a href="client.html" class="back-link">← Înapoi la pagina client</a>
      
      <div class="client-info">
        <div class="client-name" id="clientName">Se încarcă...</div>
        <div class="client-meta" id="clientMeta">Se încarcă detalii...</div>
      </div>
    </div>

    <div class="stats-row" id="statsRow" style="display: none;">
      <div class="stat-card">
        <div class="stat-value" id="totalOrders">0</div>
        <div class="stat-label">Total Comenzi</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalProducts">0</div>
        <div class="stat-label">Produse comandate</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalValue">0</div>
        <div class="stat-label">Valoare totală (RON)</div>
      </div>
    </div>

    <div id="contentArea">
      <div class="empty-state">
        <div class="loading-spinner"></div>
        <p>Se încarcă istoricul comenzilor...</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const contentArea = document.getElementById("contentArea");
      const clientNameEl = document.getElementById("clientName");
      const clientMetaEl = document.getElementById("clientMeta");
      const statsRow = document.getElementById("statsRow");

      // Preluare client din localStorage
      const client = getSelectedClient();

      if (!client) {
        contentArea.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Niciun client selectat</div>
            <p>Selectați un client pentru a vedea istoricul comenzilor.</p>
            <a href="adauga_comanda.html" class="btn btn-primary" style="margin-top: var(--space-6);">
              Alege client
            </a>
          </div>
        `;
        return;
      }

      // Afisare info client
      clientNameEl.textContent = client.name;
      clientMetaEl.textContent = `Grup: ${client.group || "-"} | Categorie: ${client.category || "-"}`;

      try {
        // Incarcare comenzi
        const res = await fetch("/api/orders");
        if (!res.ok) throw new Error("Eroare la incarcarea comenzilor");
        
        const allOrders = await res.json();
        
        // Filtrare comenzi pentru clientul curent
        const clientOrders = allOrders.filter(o => 
          o.client?.name === client.name || o.client?.id === client.id
        ).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        // Calcul statistici
        const totalOrders = clientOrders.length;
        const totalProducts = clientOrders.reduce((sum, o) => 
          sum + (o.items || []).reduce((s, i) => s + (i.qty || 0), 0), 0
        );
        const totalValue = clientOrders.reduce((sum, o) => 
          sum + (o.items || []).reduce((s, i) => {
            const price = Number(i.price || i.unitPrice || 0);
            return s + (price * (i.qty || 0));
          }, 0), 0
        );

        // Afisare statistici
        document.getElementById("totalOrders").textContent = totalOrders;
        document.getElementById("totalProducts").textContent = totalProducts;
        document.getElementById("totalValue").textContent = totalValue.toFixed(0);
        statsRow.style.display = "grid";

        if (clientOrders.length === 0) {
          contentArea.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <div class="empty-title">Nu există comenzi</div>
              <p>Acest client nu are nicio comandă înregistrată în sistem.</p>
              <a href="comanda.html" class="btn btn-primary" style="margin-top: var(--space-6);">
                Comandă Nouă
              </a>
            </div>
          `;
          return;
        }

        // Afisare lista comenzi
        const ordersList = document.createElement("div");
        ordersList.className = "orders-list";

        const statusLabels = {
          in_procesare: "În procesare",
          facturata: "Facturată",
          gata_de_livrare: "Gata de livrare",
          livrata: "Livrată"
        };

        clientOrders.forEach((order, index) => {
          const orderCard = document.createElement("div");
          orderCard.className = "order-card";

          // Calcul total comanda
          const orderTotal = (order.items || []).reduce((sum, item) => {
            const price = Number(item.price || item.unitPrice || 0);
            return sum + (price * (item.qty || 0));
          }, 0);

          // Data formata
          const orderDate = new Date(order.createdAt);
          const dateStr = orderDate.toLocaleDateString("ro-RO", {
            day: "2-digit",
            month: "long",
            year: "numeric"
          });
          const timeStr = orderDate.toLocaleTimeString("ro-RO", {
            hour: "2-digit",
            minute: "2-digit"
          });

          // Items HTML
          const itemsHtml = (order.items || []).map(item => {
            const price = Number(item.price || item.unitPrice || 0);
            const itemTotal = price * (item.qty || 0);
            
            return `
              <div class="order-item">
                <div class="item-info">
                  <div class="item-name">${escapeHtml(item.name)}</div>
                  <div class="item-details">
                    ${item.qty || 0} buc × ${price.toFixed(2)} RON = ${itemTotal.toFixed(2)} RON
                    ${item.gtin ? `<span class="badge">GTIN: ${item.gtin}</span>` : ''}
                  </div>
                </div>
                <div class="item-qty">×${item.qty || 0}</div>
              </div>
            `;
          }).join("");

          orderCard.innerHTML = `
            <div class="order-header" onclick="toggleOrder(${index})">
              <div>
                <div class="order-id">#${order.id.slice(-6)}</div>
                <div class="order-date">${dateStr} <span style="color: var(--text-muted); font-size: 0.875rem;">(${timeStr})</span></div>
              </div>
              <span class="order-status status-${order.status || 'in_procesare'}">
                ${statusLabels[order.status] || order.status}
              </span>
            </div>
            <div class="order-body" id="order-body-${index}">
              <div class="order-items">
                ${itemsHtml}
              </div>
              <div class="order-footer">
                <span class="order-total-label">Total comandă:</span>
                <span class="order-total-value">${orderTotal.toFixed(2)} RON</span>
              </div>
            </div>
          `;

          ordersList.appendChild(orderCard);
        });

        contentArea.innerHTML = "";
        contentArea.appendChild(ordersList);

      } catch (err) {
        console.error("Eroare:", err);
        contentArea.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <div class="empty-title">Eroare la încărcare</div>
            <p>Nu s-a putut încărca istoricul comenzilor. Încercați din nou.</p>
            <button onclick="location.reload()" class="btn btn-primary" style="margin-top: var(--space-6);">
              Reîncarcă
            </button>
          </div>
        `;
      }
    });

    // Functie expand/collapse (optional)
    window.toggleOrder = function(index) {
      const body = document.getElementById(`order-body-${index}`);
      if (body) {
        body.style.display = body.style.display === "none" ? "block" : "none";
      }
    };
  </script>
</body>
</html>

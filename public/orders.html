<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Comenzi - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .filters-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .filter-tabs {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding-bottom: var(--space-2);
      margin-bottom: var(--space-4);
      -webkit-overflow-scrolling: touch;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .filter-tab {
      flex-shrink: 0;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .filter-tab.active {
      background: var(--primary-600);
      color: white;
      border-color: var(--primary-600);
    }

    .filter-tab .badge-count {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
    }

    .filter-selects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    @media (min-width: 640px) {
      .filter-selects {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .search-box-orders {
      position: relative;
      margin-top: var(--space-3);
    }

    .search-box-orders input {
      padding-left: var(--space-10);
    }

    .search-icon-orders {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition-base);
    }

    .order-card:hover {
      border-color: rgba(148, 163, 184, 0.3);
    }

    .order-header {
      padding: var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      cursor: pointer;
      background: rgba(148, 163, 184, 0.03);
    }

    .order-main-info {
      flex: 1;
      min-width: 0;
    }

    .order-client {
      font-weight: 700;
      font-size: 1.0625rem;
      margin-bottom: var(--space-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-meta {
      font-size: 0.875rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .order-status-btn {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      border: none;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .order-status-btn.in_procesare {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning-500);
    }

    .order-status-btn.facturata {
      background: rgba(59, 130, 246, 0.15);
      color: var(--primary-400);
    }

    .order-status-btn.gata_de_livrare {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success-400);
    }

    .order-status-btn.livrata {
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
    }

    .order-body {
      padding: var(--space-4);
      border-top: 1px solid var(--border-color);
      display: none;
    }

    .order-card.expanded .order-body {
      display: block;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3);
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-2);
    }

    .order-item:last-child {
      margin-bottom: 0;
    }

    .order-item-name {
      font-weight: 600;
    }

    .order-item-details {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: var(--space-1);
    }

    .order-item-qty {
      font-weight: 700;
      color: var(--primary-400);
    }

    .order-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-4);
      flex-wrap: wrap;
    }

    .order-actions .btn {
      flex: 1;
      min-width: 140px;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-10) var(--space-4);
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: var(--space-4);
      opacity: 0.5;
    }

    .reset-filters {
      text-align: center;
      margin-top: var(--space-4);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Înapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1 style="margin-bottom: var(--space-5);">Comenzi</h1>

    <!-- Filtre -->
    <div class="filters-bar">
      <!-- Tabs Status -->
      <div class="filter-tabs" id="statusTabs">
        <button class="filter-tab active" data-status="">
          Toate <span class="badge-count" id="countAll">0</span>
        </button>
        <button class="filter-tab" data-status="gata_de_livrare">
          Gata de livrare <span class="badge-count" id="countGata">0</span>
        </button>
        <button class="filter-tab" data-status="in_procesare">
          În procesare <span class="badge-count" id="countProcesare">0</span>
        </button>
        <button class="filter-tab" data-status="facturata">
          Facturate <span class="badge-count" id="countFacturate">0</span>
        </button>
        <button class="filter-tab" data-status="livrata">
          Livrate <span class="badge-count" id="countLivrate">0</span>
        </button>
      </div>

      <!-- Selects -->
      <div class="filter-selects">
        <select id="filterGroup" class="form-select">
          <option value="">Toate grupurile</option>
        </select>
        <select id="filterCategory" class="form-select">
          <option value="">Toate categoriile</option>
        </select>
        <select id="filterStatus" class="form-select" style="display: none;">
          <option value="">Toate statusurile</option>
        </select>
      </div>

      <!-- Search -->
      <div class="search-box-orders">
        <span class="search-icon-orders">🔍</span>
        <input type="text" id="orderSearch" class="form-input" placeholder="Caută după nume client..." />
      </div>
    </div>

    <!-- Lista Comenzi -->
    <div class="orders-list" id="ordersList">
      <!-- Populat din JS -->
    </div>

    <div class="reset-filters">
      <button class="btn btn-ghost" id="btnResetFilters">↺ Resetează filtrele</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

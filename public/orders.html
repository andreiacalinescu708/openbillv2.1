<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Comenzi - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .filters-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .status-tabs {
      display: flex;
      gap: var(--space-3);
      overflow-x: auto;
      padding-bottom: var(--space-3);
      margin-bottom: var(--space-4);
      -webkit-overflow-scrolling: touch;
    }

    .status-tabs::-webkit-scrollbar {
      height: 4px;
    }

    .status-tabs::-webkit-scrollbar-thumb {
      background: var(--gray-600);
      border-radius: var(--radius-full);
    }

    .status-tab {
      flex-shrink: 0;
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .status-tab:hover {
      border-color: var(--primary-500);
      color: var(--text-primary);
    }

    .status-tab.active {
      background: var(--primary-600);
      color: white;
      border-color: var(--primary-600);
    }

    .status-tab .count {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 700;
    }

    .filters-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    @media (min-width: 640px) {
      .filters-row {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      padding-left: var(--space-10);
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.25rem;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition-base);
    }

    .order-card:hover {
      border-color: rgba(148, 163, 184, 0.3);
      box-shadow: var(--shadow-lg);
    }

    .order-header {
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      cursor: pointer;
      background: rgba(148, 163, 184, 0.03);
    }

    @media (min-width: 640px) {
      .order-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .order-info {
      flex: 1;
      min-width: 0;
    }

    .order-client {
      font-weight: 700;
      font-size: 1.125rem;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .order-meta {
      font-size: 0.9375rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
    }

    .order-meta span {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .order-actions-top {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .order-status-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      border: none;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .order-status-btn.in_procesare {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning-500);
    }

    .order-status-btn.facturata {
      background: rgba(59, 130, 246, 0.15);
      color: var(--primary-400);
    }

    .order-status-btn.gata_de_livrare {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success-400);
    }

    .order-status-btn.livrata {
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
    }

    .btn-modifica, .btn-pregateste {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-modifica:hover {
      background: var(--primary-600);
      color: white;
      border-color: var(--primary-600);
    }

    .btn-pregateste {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success-400);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .btn-pregateste:hover {
      background: var(--success-600);
      color: white;
    }

    .order-body {
      padding: var(--space-5);
      border-top: 1px solid var(--border-color);
      display: none;
    }

    .order-card.expanded .order-body {
      display: block;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: var(--space-4);
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-3);
    }

    .order-item:last-child {
      margin-bottom: 0;
    }

    .order-item-info {
      flex: 1;
    }

    .order-item-name {
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .order-item-details {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .order-item-price {
      text-align: right;
      font-weight: 700;
      color: var(--primary-400);
    }

    .order-item-qty {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: var(--space-1);
    }

    .reset-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-6);
      padding: var(--space-4) var(--space-8);
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .reset-btn:hover {
      border-color: var(--primary-500);
      color: var(--text-primary);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-16) var(--space-4);
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 5rem;
      margin-bottom: var(--space-4);
      opacity: 0.3;
    }

    .expand-icon {
      transition: transform var(--transition-fast);
      color: var(--text-muted);
    }

    .order-card.expanded .expand-icon {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Înapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1 style="margin-bottom: var(--space-6); font-size: 1.875rem;">Comenzi</h1>

    <!-- Filtre -->
    <div class="filters-container">
      <!-- Status Tabs -->
      <div class="status-tabs" id="statusTabs">
        <button class="status-tab active" data-status="">
          Toate <span class="count" id="countAll">0</span>
        </button>
        <button class="status-tab" data-status="gata_de_livrare">
          Gata de livrare <span class="count" id="countGata">0</span>
        </button>
        <button class="status-tab" data-status="in_procesare">
          În procesare <span class="count" id="countProcesare">0</span>
        </button>
        <button class="status-tab" data-status="facturata">
          Facturate <span class="count" id="countFacturate">0</span>
        </button>
        <button class="status-tab" data-status="livrata">
          Livrate <span class="count" id="countLivrate">0</span>
        </button>
      </div>

      <!-- Selects și Search -->
      <div class="filters-row">
        <select id="filterGroup" class="form-select">
          <option value="">Toate grupurile</option>
        </select>
        <select id="filterCategory" class="form-select">
          <option value="">Toate categoriile</option>
        </select>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="orderSearch" class="form-input" placeholder="Caută client..." />
        </div>
      </div>
    </div>

    <!-- Lista Comenzi -->
    <div class="orders-list" id="ordersList">
      <!-- Populat din JS -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📋</div>
      <h3>Nu există comenzi</h3>
      <p>Începe prin a adăuga o comandă nouă</p>
    </div>

    <button class="reset-btn" id="btnResetFilters">
      ↺ Resetează filtrele
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Clienti - OpenBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="global.css" />
  <style>
    .page-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    @media (min-width: 640px) {
      .page-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .search-box {
      position: relative;
      margin-bottom: var(--space-6);
    }

    .search-box input {
      padding-left: var(--space-10);
      font-size: 1.1rem;
      height: 3.5rem;
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.5rem;
    }

    #clientSearchResults {
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-xl);
      display: none;
    }

    #clientSearchResults.show {
      display: block;
    }

    #clientSearchResults .itembtn {
      width: 100%;
      text-align: left;
      padding: var(--space-4);
      border: none;
      border-bottom: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast);
      font-size: 1rem;
    }

    #clientSearchResults .itembtn:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    #clientSearchResults .itembtn:last-child {
      border-bottom: none;
    }

    /* ===== TABS ===== */
    .tabs-nav {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: var(--space-2);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tabs-nav::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      flex: 1;
      min-width: 90px;
      padding: var(--space-3) var(--space-4);
      font-size: 0.95rem;
      background: transparent;
      border: 2px solid transparent;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      color: var(--text-muted);
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      white-space: nowrap;
      position: relative;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: rgba(59, 130, 246, 0.1);
    }

    .tab-btn.active {
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.15);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-blue);
    }

    .tab-badge {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-weight: 600;
    }

    .tab-btn.active .tab-badge {
      background: var(--accent-blue);
      color: white;
    }

    /* ===== TAB CONTENT ===== */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .clients-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      min-height: 400px;
    }

    /* ===== COUNTY ACCORDION ===== */
    .county-accordion {
      margin-bottom: var(--space-3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(30, 41, 59, 0.5);
    }

    .county-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4);
      background: rgba(59, 130, 246, 0.1);
      border: none;
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .county-header:hover {
      background: rgba(59, 130, 246, 0.2);
      color: var(--text-primary);
    }

    .county-header::after {
      content: "▼";
      font-size: 0.875rem;
      transition: transform 0.3s ease;
      color: var(--accent-blue);
    }

    .county-header.active::after {
      transform: rotate(180deg);
    }

    .county-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .county-body.open {
      max-height: 2000px;
      transition: max-height 0.4s ease-in;
    }

    .county-content {
      padding: var(--space-4);
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
    }

    @media (min-width: 640px) {
      .county-content {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .county-content {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ===== CLIENT CARDS ===== */
    .clients-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
    }

    @media (min-width: 640px) {
      .clients-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .clients-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .client-card {
      position: relative;
      padding: var(--space-5);
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-xl);
      color: var(--text-primary);
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-height: 4rem;
      width: 100%;
    }

    .client-card::before {
      content: "\1F464";
      font-size: 1.5rem;
      opacity: 0.7;
    }

    .client-card:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: var(--accent-blue);
      box-shadow: 0 12px 24px -4px rgba(2, 132, 199, 0.4);
      background: linear-gradient(145deg, #1e293b 0%, #1e3a5f 100%);
    }

    .client-card:active {
      transform: translateY(-1px) scale(0.98);
    }

    .client-card .client-name {
      flex: 1;
      font-size: 1.125rem;
      line-height: 1.4;
    }

    .client-card .arrow {
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
      color: var(--accent-blue);
      font-size: 1.25rem;
    }

    .client-card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .county-count {
      background: rgba(59, 130, 246, 0.3);
      color: var(--text-secondary);
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-10);
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon"><svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><defs><linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" /><stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" /></linearGradient></defs><rect width="100" height="100" rx="20" fill="url(#bgLogo)"/><text x="32" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="45" font-weight="600" fill="#ffffff">o</text><text x="52" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#38bdf8">B</text><rect width="100" height="100" rx="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/></svg></div>
        <span>Pagina Principala</span>
      </a>
      <div class="navbar-actions">
        <div id="userBar"></div>
        <a href="index.html" class="btn btn-ghost btn-sm">&larr; Inapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <div>
        <h1 style="margin-bottom: var(--space-2); font-size: 2rem;">Selecteaza Client</h1>
        <p style="color: var(--text-muted); margin: 0; font-size: 1.125rem;">Alege un client pentru a incepe o comanda noua</p>
      </div>
       <button class="btn btn-primary btn-lg" id="btnViewCurrentOrder" style="display: none; align-items: center; gap: 10px;">
    <span>&#128722;</span>
    <span>Vizualizeaza comanda actuala</span>
    <span id="cartBadge" style="background: #ef4444; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-left: 8px; display: none;">0</span>
  </button>
</div>
    </div>

    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input 
        type="text" 
        id="searchClient" 
        class="form-input" 
        placeholder="Cauta client dupa nume..." 
        autocomplete="off" 
      />
      <div id="clientSearchResults"></div>
    </div>

    <!-- TAB NAVIGATION -->
    <div class="tabs-nav" id="categoryTabs">
      <!-- Tab-urile se genereaza dinamic -->
    </div>

    <!-- TAB CONTENT -->
    <div class="clients-container" id="categoryContents">
      <!-- Continutul tab-urilor se genereaza dinamic -->
    </div>
  </main>

  <script src="script.js"></script>
  
  
  <script>
    // Categorii disponibile (vor fi încărcate de la API)
    let AVAILABLE_CATEGORIES = [];
    
    document.addEventListener("DOMContentLoaded", async function() {
      try {
        // Încărcăm categoriile și datele clienților în paralel
        const [categoriesRes, treeRes, flatRes] = await Promise.all([
          fetch("/api/client-categories"),
          fetch("/api/clients-tree"),
          fetch("/api/clients-flat")
        ]);
        
        const categoriesData = await categoriesRes.json();
        AVAILABLE_CATEGORIES = categoriesData.categories || [];
        const tree = await treeRes.json();
        const flat = await flatRes.json();
        
        // Salvăm flat în localStorage pentru a-l folosi în selectClient
        localStorage.setItem('clientsFlat', JSON.stringify(flat));
        
        // Generăm tab-urile dinamic
        generateTabs(AVAILABLE_CATEGORIES, tree);
        
        // Inițializăm tab-urile
        initTabs();
        
        // Inițializăm căutarea
        initSearch(flat);
        
      } catch (err) {
        console.error("Eroare:", err);
        document.getElementById('categoryContents').innerHTML = `
          <div class="empty-state">
            <p>Eroare la încărcarea datelor. Reîncearcă.</p>
          </div>
        `;
      }
    });
    
    // Extrage toți clienții dintr-o categorie specifică din tree
    function getClientsForCategory(tree, category) {
      const clients = [];
      const categoryLower = category.toLowerCase();
      
      // Tree structure: { group: { category: [clients] } }
      Object.keys(tree).forEach(group => {
        const groupData = tree[group];
        if (typeof groupData === 'object') {
          Object.keys(groupData).forEach(cat => {
            if (cat.toLowerCase() === categoryLower) {
              const catClients = groupData[cat];
              if (Array.isArray(catClients)) {
                clients.push(...catClients);
              }
            }
          });
        }
      });
      
      return clients;
    }
    
    // Generează tab-urile și conținutul dinamic
    function generateTabs(categories, tree) {
      const tabsContainer = document.getElementById('categoryTabs');
      const contentsContainer = document.getElementById('categoryContents');
      
      tabsContainer.innerHTML = '';
      contentsContainer.innerHTML = '';
      
      if (categories.length === 0) {
        contentsContainer.innerHTML = `
          <div class="empty-state">
            <p>Nu există categorii definite.</p>
          </div>
        `;
        return;
      }
      
      // Iconițe pentru categorii
      const categoryIcons = {
        'Craiova': '📍',
        'Targu Jiu': '📍',
        'Valcea': '📍',
        'Calafat': '📍',
        'Olt': '📍',
        'Hunedoara': '📍',
        'Horezu': '📍',
        'Altele': '📍'
      };
      
      categories.forEach((category, index) => {
        // Extragem clienții pentru această categorie din toate grupurile
        const clients = getClientsForCategory(tree, category);
        const clientCount = clients.length;
        
        // Creăm tab-ul
        const tabId = category.toLowerCase().replace(/\s+/g, '-');
        const tabBtn = document.createElement('button');
        tabBtn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
        tabBtn.dataset.tab = tabId;
        tabBtn.innerHTML = `
          <span>${categoryIcons[category] || '📍'}</span>
          <span>${category}</span>
          <span class="tab-badge" id="count-${tabId}">${clientCount}</span>
        `;
        tabsContainer.appendChild(tabBtn);
        
        // Creăm conținutul tab-ului
        const tabContent = document.createElement('div');
        tabContent.id = `tab-${tabId}`;
        tabContent.className = `tab-content ${index === 0 ? 'active' : ''}`;
        
        const contentDiv = document.createElement('div');
        contentDiv.id = `content-${tabId}`;
        
        if (clientCount === 0) {
          contentDiv.innerHTML = `
            <div class="empty-state">
              <div style="font-size: 3rem; margin-bottom: var(--space-4); opacity: 0.3;">${categoryIcons[category] || '📍'}</div>
              <p>Nu există clienți în ${category}.</p>
            </div>
          `;
        } else {
          // Sortăm și randăm clienții
          clients.sort((a, b) => String(a).localeCompare(String(b), 'ro'));
          renderSimpleList(contentDiv, clients);
        }
        
        tabContent.appendChild(contentDiv);
        contentsContainer.appendChild(tabContent);
      });
    }
    
    // Randează o listă simplă de clienți
    function renderSimpleList(container, clients) {
      if (clients.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Nu există clienți în această categorie.</p>
          </div>
        `;
        return;
      }
      
      // Sortare alfabetică
      const sortedClients = [...clients].sort((a, b) => String(a).localeCompare(String(b), 'ro'));
      
      const grid = document.createElement('div');
      grid.className = 'clients-grid';
      
      sortedClients.forEach(name => {
        const card = document.createElement('button');
        card.className = 'client-card';
        card.innerHTML = `
          <span class="client-name">${name}</span>
          <span class="arrow">→</span>
        `;
        card.onclick = () => selectClient(name);
        grid.appendChild(card);
      });
      
      container.innerHTML = '';
      container.appendChild(grid);
    }
    
    // Randează o listă grupată de clienți (ex: pe județe)
    function renderGroupedList(container, data, categoryName) {
      const groups = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0], 'ro'));
      
      if (groups.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Nu există clienți în ${categoryName}.</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = '';
      
      groups.forEach(([groupName, clients], index) => {
        const clientsArray = Array.isArray(clients) ? clients : Object.values(clients || {});
        
        const accordion = document.createElement('div');
        accordion.className = 'county-accordion';
        
        const header = document.createElement('button');
        header.className = 'county-header';
        header.type = 'button';
        header.innerHTML = `
          <span style="display: flex; align-items: center; gap: 8px;">
            🏘️ ${groupName}
          </span>
          <span class="county-count">${clientsArray.length} clienți</span>
        `;
        
        const body = document.createElement('div');
        body.className = 'county-body';
        
        const content = document.createElement('div');
        content.className = 'county-content';
        
        // Sortăm clienții și creăm cardurile
        clientsArray.sort((a, b) => String(a).localeCompare(String(b), 'ro'));
        
        clientsArray.forEach(name => {
          const card = document.createElement('button');
          card.className = 'client-card';
          card.innerHTML = `
            <span class="client-name">${name}</span>
            <span class="arrow">&rarr;</span>
          `;
          card.onclick = () => selectClient(name);
          content.appendChild(card);
        });
        
        body.appendChild(content);
        accordion.appendChild(header);
        accordion.appendChild(body);
        container.appendChild(accordion);
        
        // Toggle accordion
        header.addEventListener('click', () => {
          const isOpen = body.style.display === 'block';
          document.querySelectorAll('.county-body').forEach(b => b.style.display = 'none');
          document.querySelectorAll('.county-header').forEach(h => h.classList.remove('open'));
          
          if (!isOpen) {
            body.style.display = 'block';
            header.classList.add('open');
          }
        });
        
        // Deschidem primul grup implicit
        if (index === 0) {
          body.style.display = 'block';
          header.classList.add('open');
        }
      });
    }
    
    function initTabs() {
      const buttons = document.querySelectorAll('.tab-btn');
      const contents = document.querySelectorAll('.tab-content');
      
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          contents.forEach(c => c.classList.remove('active'));
          
          btn.classList.add('active');
          document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
      });
    }
    
    function initSearch(flatClients) {
      const searchInput = document.getElementById('searchClient');
      const resultsDiv = document.getElementById('clientSearchResults');
      
      if (!searchInput || !resultsDiv) return;
      
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim().toLowerCase();
        
        if (query.length < 2) {
          resultsDiv.style.display = 'none';
          return;
        }
        
        const matches = flatClients.filter(c => 
          c.name.toLowerCase().includes(query)
        ).slice(0, 10);
        
        if (matches.length === 0) {
          resultsDiv.innerHTML = '<div style="padding: 12px; color: var(--text-muted);">Niciun rezultat</div>';
        } else {
          resultsDiv.innerHTML = matches.map(c => `
            <div class="search-result-item" onclick="selectClient('${c.name.replace(/'/, "\\'")}')">
              <strong>${c.name}</strong>
              <span style="color: var(--text-muted); font-size: 0.875rem;">${c.category || ''}</span>
            </div>
          `).join('');
        }
        
        resultsDiv.style.display = 'block';
      });
      
      document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
          resultsDiv.style.display = 'none';
        }
      });
    }
    
    // Selectează client și merge la pagina de comenzi
    function selectClient(name) {
      const flat = JSON.parse(localStorage.getItem('clientsFlat') || '[]');
      const client = flat.find(c => c.name === name);
      
      if (!client) {
        alert("Clientul nu a fost gasit");
        return;
      }
      
      // Verificăm coșul existent
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length > 0) {
        const currentClient = JSON.parse(localStorage.getItem("clientSelectat") || '{}');
        if (currentClient.id !== client.id) {
          if (!confirm("Ai produse in cos pentru alt client. Doresti sa stergi cosul si sa continui cu noul client?")) {
            return;
          }
          localStorage.removeItem("cart");
        }
      }
      
      localStorage.setItem("clientSelectat", JSON.stringify(client));
      location.href = "client.html";
    }
  </script>
</body>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Clienți - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    /* Ajustări specifice pentru această pagină */
    .page-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    @media (min-width: 640px) {
      .page-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .search-box {
      position: relative;
      margin-bottom: var(--space-6);
    }

    .search-box input {
      padding-left: var(--space-10);
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.25rem;
    }

    .search-results {
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-xl);
      display: none;
    }

    .search-results.show {
      display: block;
    }

    .search-result-item {
      padding: var(--space-4);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: background var(--transition-fast);
      text-align: left;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 0.9375rem;
    }

    .search-result-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .clients-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      min-height: 400px;
    }

    .client-tree h4 {
      margin: var(--space-4) 0 var(--space-3);
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .client-tree button {
      width: 100%;
      text-align: left;
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 0.9375rem;
    }

    .client-tree button:hover {
      background: var(--primary-600);
      border-color: var(--primary-600);
      color: white;
      transform: translateX(4px);
    }

    .client-tree .accHead {
      width: 100%;
      text-align: left;
      padding: var(--space-3) var(--space-4);
      margin: var(--space-2) 0;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-lg);
      color: var(--primary-400);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .client-tree .accHead:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    .client-tree .accBody {
      padding-left: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-10);
      color: var(--text-muted);
    }

    .cart-indicator {
      position: relative;
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--danger-500);
      color: white;
      width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- Navbar consistent cu restul paginilor -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions">
        <div id="userBar"></div>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Header cu titlu și buton vizualizare comandă -->
    <div class="page-header">
      <div>
        <h1 style="margin-bottom: var(--space-2);">Selectează Client</h1>
        <p style="color: var(--text-muted); margin: 0;">Alege un client pentru a începe o comandă nouă</p>
      </div>
      
      <button class="btn btn-primary btn-lg" id="btnViewCurrentOrder" style="display: none;">
        <span>🛒</span>
        <span>Vizualizează comanda actuală</span>
        <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
      </button>
    </div>

    <!-- Search Box -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        id="searchClient" 
        class="form-input" 
        placeholder="Caută client după nume..." 
        autocomplete="off" 
      />
      <div class="search-results" id="clientSearchResults"></div>
    </div>

    <!-- Lista Clienți -->
    <div class="clients-container">
      <div class="card-header" style="margin-bottom: var(--space-4);">
        <div>
          <h3 style="margin: 0; font-size: 1.125rem;">Lista Clienți</h3>
          <p style="margin: var(--space-1) 0 0; color: var(--text-muted); font-size: 0.875rem;">
            Grupați pe categorii și locații
          </p>
        </div>
      </div>
      
      <div id="clientsTree" class="client-tree">
        <!-- Populat din JS -->
        <div class="empty-state">
          <div style="font-size: 3rem; margin-bottom: var(--space-4); opacity: 0.3;">👥</div>
          <p>Se încarcă lista de clienți...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

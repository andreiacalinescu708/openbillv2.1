<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Clienți - Fast Medical Distribution</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .page-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    @media (min-width: 640px) {
      .page-header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .search-box {
      position: relative;
      margin-bottom: var(--space-6);
    }

    .search-box input {
      padding-left: var(--space-10);
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.25rem;
    }

    /* Container pentru rezultate search - populat dinamic de JS */
    #clientSearchResults {
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: var(--shadow-xl);
      display: none; /* Ascuns default, JS îl arată când e ceva */
    }

    #clientSearchResults.show {
      display: block;
    }

    /* Stil pentru butoanele generate de JS în search */
    #clientSearchResults .itembtn {
      width: 100%;
      text-align: left;
      padding: var(--space-4);
      border: none;
      border-bottom: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      transition: background var(--transition-fast);
      font-size: 0.9375rem;
    }

    #clientSearchResults .itembtn:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    #clientSearchResults .itembtn:last-child {
      border-bottom: none;
    }

    .clients-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      min-height: 400px;
    }

    /* Stiluri pentru tree-ul generat de renderTree() */
    #clientsTree h4 {
      margin: var(--space-4) 0 var(--space-3);
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Butoane clienți din tree */
    #clientsTree .itembtn {
      width: 100%;
      text-align: left;
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 0.9375rem;
    }

    #clientsTree .itembtn:hover {
      background: var(--primary-600);
      border-color: var(--primary-600);
      color: white;
      transform: translateX(4px);
    }

    /* Accordion headers din tree */
    #clientsTree .accHead {
      width: 100%;
      text-align: left;
      padding: var(--space-3) var(--space-4);
      margin: var(--space-2) 0;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-lg);
      color: var(--primary-400);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-weight: 600;
      font-size: 0.9375rem;
    }

    #clientsTree .accHead:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    #clientsTree .accBody {
      padding-left: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-10);
      color: var(--text-muted);
    }

    /* Badge pentru coș */
    .cart-indicator {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }

    #cartBadge {
      display: none; /* Ascuns default, JS îl arată */
      background: var(--danger-500);
      color: white;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: var(--space-2);
    }

    #btnViewCurrentOrder {
      display: none; /* JS îl va face vizibil dacă există items în coș */
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-icon">⚕️</div>
        <span>FMD</span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Înapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <div>
        <h1 style="margin-bottom: var(--space-2);">Selectează Client</h1>
        <p style="color: var(--text-muted); margin: 0;">Alege un client pentru a începe o comandă nouă</p>
      </div>
      
      <button class="btn btn-primary btn-lg cart-indicator" id="btnViewCurrentOrder">
        <span>🛒</span>
        <span>Vizualizează comanda actuală</span>
        <span id="cartBadge">0</span>
      </button>
    </div>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        id="searchClient" 
        class="form-input" 
        placeholder="Caută client după nume..." 
        autocomplete="off" 
      />
      <div id="clientSearchResults"></div>
    </div>

    <div class="clients-container">
      <div class="card-header" style="margin-bottom: var(--space-4);">
        <div>
          <h3 style="margin: 0; font-size: 1.125rem;">Lista Clienți</h3>
          <p style="margin: var(--space-1) 0 0; color: var(--text-muted); font-size: 0.875rem;">
            Selectează un client pentru a continua
          </p>
        </div>
      </div>
      
      <div id="clientsTree">
        <div class="empty-state">
          <div style="font-size: 3rem; margin-bottom: var(--space-4); opacity: 0.3;">👥</div>
          <p>Se încarcă lista de clienți...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Inițializare vizibilitate buton coș - sincronizat cu logica din script.js
    document.addEventListener("DOMContentLoaded", function() {
      const btn = document.getElementById("btnViewCurrentOrder");
      const badge = document.getElementById("cartBadge");
      
      try {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        if (cart.length > 0) {
          btn.style.display = "inline-flex";
          badge.style.display = "inline";
          badge.textContent = cart.length;
        }
      } catch (e) {
        console.log("Eroare la citirea coșului");
      }
    });
  </script>
  
  <script src="script.js"></script>
</body>
</html>

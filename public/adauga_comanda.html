<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clienți</title>

  
  <!-- ✅ CSS nou, doar pentru pagina asta -->
  <link rel="stylesheet" href="adauga_comandahtml.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">⚕️ Fast Medical Distribution</span>
    </div>

    <div class="topbar-center"></div>

    <div class="topbar-right">
      <button id="btnToggleTheme" class="icon-btn">🌙</button>
      <div id="userBar"></div>
    </div>
  </header>

  <main class="container">
    <div style="margin-bottom:15px;">
      <a href="index.html" class="btn">
        ⬅️ Pagina Principală
      </a>
    </div>

    <button class="linkbtn" id="btnViewCurrentOrder">🧾 Vizualizează comanda actuală</button>

    <p class="hint">Selectează un client ca să intri în fișa lui.</p>

    <div class="client-search">
      <input type="text" id="searchClient" placeholder="Caută client..." />
      <div id="clientSearchResults" class="list"></div>
    </div>

    <div id="clientsTree" class="tree"></div>

    <a class="linkbtn" href="index.html">Dashboard</a>
  </main>

  <script src="script.js"></script>
</body>
</html>

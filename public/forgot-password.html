<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am uitat parola - OpenBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #475569;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
    }
    
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid var(--border);
    }
    
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9375rem;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.875rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    
    .btn:hover {
      background: var(--primary-hover);
    }
    
    .alert {
      padding: 0.875rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    
    .alert.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid var(--success);
      color: var(--success);
    }
    
    .alert.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    
    .hidden {
      display: none;
    }
    
    .login-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.875rem;
    }
    
    .login-link a {
      color: var(--primary);
      text-decoration: none;
    }
    
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="form" class="card">
      <div class="header">
        <h1>🔐 Resetare Parolă</h1>
        <p>Introdu username-ul sau email-ul și vei primi instrucțiuni</p>
      </div>
      
      <div id="alert"></div>
      
      <form id="forgotForm">
        <div class="form-group">
          <label for="username">Username / Email *</label>
          <input type="text" id="username" name="username" required placeholder="Username sau Email">
        </div>
        
        <button type="submit" class="btn">Trimite Email Resetare</button>
      </form>
      
      <div class="login-link">
        <a href="/login.html">← Înapoi la login</a>
      </div>
    </div>
    
    <div id="success" class="card hidden">
      <div class="header">
        <h1>✅ Email trimis!</h1>
        <p>Dacă există un cont cu acest username, vei primi un email cu instrucțiuni pentru resetarea parolei.</p>
      </div>
      <a href="/login.html" class="btn" style="display: inline-block; text-align: center; text-decoration: none; margin-top: 1rem;">Mergi la login</a>
    </div>
  </div>
  
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        
        const data = await res.json();
        
        // Afișăm succes indiferent dacă utilizatorul există (securitate)
        document.getElementById('form').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
        
      } catch (err) {
        console.error('Eroare:', err);
        showAlert('Eroare de conexiune. Încearcă din nou.', 'error');
      }
    });
    
    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = 'alert ' + type;
    }
  </script>
</body>
</html>
